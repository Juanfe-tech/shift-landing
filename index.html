/* ════════════════════════════════════════════════
   SHIFT — design system
   editorial · atmospheric · physically grounded
   ════════════════════════════════════════════════ */

:root{
  /* Color tokens */
  --cream:        #F5F2EA;
  --cream-deep:   #EDE8DC;
  --cream-soft:   #FBF9F2;
  --cream-warm:   #F7F3E9;
  --white:        #FFFFFF;

  --blush:        #F5CFCF;
  --blush-deep:   #E8A5A5;
  --blush-glow:   #F9D9D9;
  --terracotta:   #D4846F;
  --sage:         #B5CDB7;

  --ink:          #0F0E0C;
  --ink-soft:     #3D3A35;
  --muted:        #6B6761;
  --soft:         #9A9691;
  --faint:        #C4C0B8;

  --hair:         rgba(15,14,12,0.06);
  --hair-soft:    rgba(15,14,12,0.03);
  --hair-strong:  rgba(15,14,12,0.10);

  /* Quality colors — for the Log */
  --copper:           #C99580;
  --copper-tint:      rgba(201,149,128,0.14);
  --copper-tint-deep: rgba(201,149,128,0.22);
  --pink-q:           #E8A5A5;
  --pink-q-tint:      rgba(232,165,165,0.15);
  --pink-q-tint-deep: rgba(232,165,165,0.22);
  --green-q:          #A4C2A8;
  --green-q-tint:     rgba(164,194,168,0.18);
  --green-q-tint-deep:rgba(164,194,168,0.28);
  --gold-q:           #C9A96E;
  --gold-q-tint:      rgba(201,169,110,0.16);
  --gold-q-tint-deep: rgba(201,169,110,0.25);
  --white-soft:       #FBF8F1;

  /* Easings — physics-based */
  --out-expo:   cubic-bezier(0.16, 1, 0.3, 1);
  --out-quint:  cubic-bezier(0.22, 1, 0.36, 1);
  --spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
  --organic:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-in-out:cubic-bezier(0.45, 0.05, 0.55, 0.95);
}

*{
  box-sizing:border-box;
  margin:0;padding:0;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
html{
  height:-webkit-fill-available;
  background:#F5F2EA;
  color-scheme:light only;
}
::selection{background:var(--blush);color:var(--ink)}
::-webkit-scrollbar{display:none}

body{
  color:var(--ink);
  font-family:'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight:400;
  letter-spacing:-0.01em;
  overscroll-behavior:none;
  min-height:100vh;
  min-height:-webkit-fill-available;
  position:relative;
  color-scheme:light only;

  /* Atmospheric layered light — multi-radial dawn on cream paper */
  background:
    radial-gradient(
      ellipse 120% 60% at 50% -5%,
      rgba(245,207,207,0.28) 0%,
      rgba(245,207,207,0) 55%
    ),
    radial-gradient(
      ellipse 80% 50% at 100% 25%,
      rgba(232,165,165,0.10) 0%,
      rgba(232,165,165,0) 60%
    ),
    radial-gradient(
      ellipse 100% 70% at 50% 110%,
      rgba(237,232,220,0.65) 0%,
      rgba(237,232,220,0) 75%
    ),
    var(--cream);
  background-attachment:fixed;
}

/* Subtle film grain — paper texture, fixed to viewport */
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3CfeColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.022 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.65;
  mix-blend-mode:multiply;
}

/* The atmospheric breath — gradient softly pulses over 12s */
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  background:radial-gradient(
    ellipse 100% 60% at 50% -10%,
    rgba(245,207,207,0.10) 0%,
    rgba(245,207,207,0) 60%
  );
  animation:atmosphere-breath 14s ease-in-out infinite alternate;
}
@keyframes atmosphere-breath{
  from{opacity:0.4}
  to{opacity:1}
}

textarea, input{
  font-family:'Inter Tight', sans-serif;
  background:transparent;
  color:var(--ink);
  border:none;outline:none;
  letter-spacing:-0.005em;
  font-weight:400;
}
textarea::placeholder, input::placeholder{color:var(--soft)}
textarea{resize:none;line-height:1.5}

button{
  cursor:pointer;
  background:transparent;
  border:none;
  color:inherit;
  font-family:'Inter Tight', sans-serif;
  letter-spacing:-0.005em;
  font-weight:400;
}
button:disabled{opacity:0.35;cursor:not-allowed}

/* ════════════════════════════════════════════════
   SERIF UTILITIES — the editorial voice
   ════════════════════════════════════════════════ */
.sf{font-family:'Fraunces', Georgia, serif; font-weight:400; letter-spacing:-0.025em}
.sf-l{font-family:'Fraunces', Georgia, serif; font-weight:300; letter-spacing:-0.025em}
.sf-m{font-family:'Fraunces', Georgia, serif; font-weight:500; letter-spacing:-0.02em}
.it{font-style:italic}
.serif-italic{font-family:'Fraunces', Georgia, serif; font-style:italic; font-weight:400; letter-spacing:-0.015em}

/* ════════════════════════════════════════════════
   SCREEN — the canvas every page is painted on
   ════════════════════════════════════════════════ */
.screen{
  width:100%;
  max-width:430px;
  margin:0 auto;
  padding:0 24px 110px;
  padding-top:env(safe-area-inset-top);
  position:relative;
  z-index:2;
}

/* Stagger entrance for top-level children */
.stagger > *{
  opacity:0;
  transform:translateY(14px);
  animation:stagger-in 0.85s var(--out-expo) forwards;
}
.stagger > *:nth-child(1){animation-delay:.05s}
.stagger > *:nth-child(2){animation-delay:.18s}
.stagger > *:nth-child(3){animation-delay:.31s}
.stagger > *:nth-child(4){animation-delay:.44s}
.stagger > *:nth-child(5){animation-delay:.57s}
.stagger > *:nth-child(6){animation-delay:.70s}
.stagger > *:nth-child(7){animation-delay:.83s}
.stagger > *:nth-child(8){animation-delay:.96s}
.stagger > *:nth-child(9){animation-delay:1.05s}
.stagger > *:nth-child(10){animation-delay:1.15s}
@keyframes stagger-in{to{opacity:1;transform:translateY(0)}}

/* Generic fade-up for sub-screens */
.fade-up{animation:fade-up 0.6s var(--out-expo) forwards}
@keyframes fade-up{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ════════════════════════════════════════════════
   APP HEADER (top bar)
   ════════════════════════════════════════════════ */
.app-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 8px;
}
.app-name{
  font-family:'Fraunces', serif;
  font-weight:500;
  font-size:14px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink);
}
.app-menu{
  width:36px;height:36px;
  border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(15,14,12,0.04);
  font-size:14px;
  color:var(--muted);
  letter-spacing:0.1em;
  border:1px solid var(--hair-soft);
  transition:all 0.4s var(--out-expo);
  cursor:pointer;
}
.app-menu:hover{background:rgba(15,14,12,0.08); transform:scale(1.05)}
.app-menu:active{transform:scale(0.95)}

/* ════════════════════════════════════════════════
   HERO — Greeting
   ════════════════════════════════════════════════ */
.hero{margin:18px 0 28px}
.hero-date{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:300;
  font-size:14px;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:-0.01em;
}
.hero-name{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:42px;
  letter-spacing:-0.04em;
  line-height:1.05;
  color:var(--ink);
}
.hero-name em{font-style:italic; color:var(--ink-soft); font-weight:300}

/* ════════════════════════════════════════════════
   MOVEMENT 1 — Where you are
   eyebrow + greeting · mini ring · streak chain
   ════════════════════════════════════════════════ */
.m1{margin:18px 0 36px}

.m1-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:14px;
  color:var(--ink-soft);
  margin-bottom:12px;
  letter-spacing:-0.01em;
}

.m1-row{
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  margin-bottom:20px;
}
.m1-greeting{flex:1}
.m1-name{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:32px;
  letter-spacing:-0.04em;
  line-height:1.05;
  color:var(--ink);
}
.m1-name em{font-style:italic;color:var(--ink-soft);font-weight:300}

.mini-ring{
  display:block;
  flex-shrink:0;
  filter:drop-shadow(0 2px 6px rgba(232,165,165,0.18));
}

.m1-pulse{
  display:flex;align-items:center;gap:10px;
  padding:14px 0 0;
  border-top:1px solid var(--hair);
}
.m1-pulse-streak-label{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:12px;
  color:var(--muted);
  letter-spacing:-0.005em;
  flex-shrink:0;
}
.m1-pulse-dots{display:flex;gap:3px;flex-wrap:nowrap}
.m1-pulse-dot{
  width:5px;height:5px;border-radius:999px;
  background:var(--blush-deep);
  flex-shrink:0;
}
.m1-pulse-dot.empty{background:rgba(15,14,12,0.08)}
.m1-pulse-dot.current{box-shadow:0 0 0 2px rgba(232,165,165,0.30)}

/* ════════════════════════════════════════════════
   MOVEMENT 2 — What you know today
   ════════════════════════════════════════════════ */
.m2{margin-bottom:32px}
.m2-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.04em;
  text-transform:uppercase;
  margin-bottom:10px;
}

/* lesson-card already styled below — these tweaks layer in the in-Today view */
.m2 .lesson-card{
  margin-bottom:0;
}
.lesson-quote{
  position:relative;z-index:1;
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13.5px;
  line-height:1.55;
  color:rgba(245,242,234,0.65);
  margin-bottom:6px;
  padding-left:14px;
  border-left:1px solid rgba(245,207,207,0.20);
}
.lesson-attr{
  position:relative;z-index:1;
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  color:rgba(245,207,207,0.55);
  margin-bottom:20px;
  padding-left:14px;
}
.lesson-cta-row{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:space-between;
  padding-top:16px;
  border-top:1px solid rgba(245,242,234,0.08);
}
.lesson-cta-status{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  color:rgba(245,242,234,0.4);
}

/* ════════════════════════════════════════════════
   MOVEMENT 4 — How you enter and seal
   ════════════════════════════════════════════════ */
.m4{margin-bottom:28px}
.m4-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.04em;
  text-transform:uppercase;
  margin-bottom:10px;
}

/* ════════════════════════════════════════════════
   MOVEMENT 5 — Why
   ════════════════════════════════════════════════ */
.m5{margin-bottom:28px}

/* ════════════════════════════════════════════════
   DAY OBJECT — the work counter
   ════════════════════════════════════════════════ */
.day-block{margin-bottom:32px}
.day-meta{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:14px;
}
.day-meta-label{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:13px;
  color:var(--muted);
  letter-spacing:-0.01em;
}
.day-number-row{
  display:flex;align-items:baseline;gap:14px;
  margin-bottom:22px;
}
.day-number{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:96px;
  letter-spacing:-0.07em;
  line-height:0.85;
  color:var(--ink);
}
.day-of{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:300;
  font-size:24px;
  color:var(--soft);
  letter-spacing:-0.02em;
}

/* The arc — progress rail */
.day-arc{
  position:relative;
  height:2px;
  background:rgba(15,14,12,0.06);
  border-radius:2px;
  overflow:hidden;
  margin-bottom:18px;
}
.day-arc-fill{
  position:absolute;top:0;left:0;height:100%;
  background:linear-gradient(90deg, var(--blush-deep), var(--blush));
  border-radius:2px;
  box-shadow:0 0 8px rgba(232,165,165,0.45);
  transition:width 1.6s var(--out-expo);
}
.day-arc-fill::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  animation:shimmer 4s ease-in-out 3s infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(900%)}
}

/* Streak — chain of dots */
.streak-row{
  display:flex;justify-content:space-between;align-items:center;
  gap:14px;
}
.streak-label{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13px;
  color:var(--muted);
  letter-spacing:-0.01em;
  flex-shrink:0;
}
.streak-dots{display:flex;gap:5px;flex-wrap:nowrap}
.streak-dot{
  width:7px;height:7px;
  border-radius:999px;
  background:var(--blush-deep);
  flex-shrink:0;
}
.streak-dot.empty{background:rgba(15,14,12,0.10)}
.streak-dot.current{
  background:var(--blush-deep);
  animation:dot-pulse 2.4s ease-in-out infinite;
}
@keyframes dot-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(232,165,165,0.65)}
  50%{box-shadow:0 0 0 6px rgba(232,165,165,0)}
}

/* ════════════════════════════════════════════════
   LESSON CARD — the deep ink room
   ════════════════════════════════════════════════ */
.lesson-card{
  position:relative;
  background:var(--ink);
  color:var(--cream);
  border-radius:20px;
  padding:30px 26px;
  margin-bottom:32px;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.6s var(--out-expo), box-shadow 0.6s var(--out-expo);
  box-shadow:
    0 14px 40px rgba(15,14,12,0.18),
    0 4px 12px rgba(15,14,12,0.10);
  -webkit-tap-highlight-color:transparent;
}
.lesson-card:hover{
  transform:translateY(-2px);
  box-shadow:
    0 20px 48px rgba(15,14,12,0.24),
    0 6px 14px rgba(15,14,12,0.13);
}
.lesson-card:active{
  transform:translateY(0) scale(0.99);
  transition:transform 0.15s ease;
}

/* Two atmospheric blooms drifting inside the dark card */
.lesson-card::before{
  content:'';
  position:absolute;
  top:-50%;right:-25%;
  width:280px;height:280px;
  background:radial-gradient(circle, rgba(245,207,207,0.20) 0%, rgba(245,207,207,0) 65%);
  pointer-events:none;
  animation:bloom-drift-a 12s ease-in-out infinite alternate;
}
.lesson-card::after{
  content:'';
  position:absolute;
  bottom:-40%;left:-20%;
  width:220px;height:220px;
  background:radial-gradient(circle, rgba(212,132,111,0.10) 0%, rgba(212,132,111,0) 70%);
  pointer-events:none;
  animation:bloom-drift-b 14s ease-in-out 3s infinite alternate-reverse;
}
@keyframes bloom-drift-a{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(36px, 24px) scale(1.12)}
}
@keyframes bloom-drift-b{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(-24px, -18px) scale(1.08)}
}

.lesson-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;
  position:relative;z-index:1;
}
.lesson-chapter{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:12.5px;
  color:var(--blush);
  letter-spacing:-0.005em;
}
.lesson-time{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:11px;
  color:rgba(245,242,234,0.42);
  letter-spacing:-0.005em;
}
.lesson-title{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:28px;
  letter-spacing:-0.035em;
  line-height:1.12;
  color:var(--cream);
  margin-bottom:18px;
  position:relative;z-index:1;
}
.lesson-title em{font-style:italic; color:var(--blush); font-weight:400}
.lesson-preview{
  font-size:14.5px;
  line-height:1.6;
  color:rgba(245,242,234,0.75);
  margin-bottom:22px;
  font-weight:300;
  position:relative;z-index:1;
}
.lesson-cite{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  color:rgba(245,207,207,0.55);
  margin-bottom:20px;
  position:relative;z-index:1;
}
.lesson-cta{
  display:flex;align-items:center;gap:10px;
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:14.5px;
  color:var(--blush);
  position:relative;z-index:1;
}
.lesson-cta-arrow{
  font-size:18px;
  transition:transform 0.4s var(--out-expo);
}
.lesson-card:hover .lesson-cta-arrow{transform:translateX(6px)}

/* ════════════════════════════════════════════════
   PRACTICE — daily actions, sealable
   ════════════════════════════════════════════════ */
.practice-section{margin-bottom:24px}
.section-head{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:18px;
}
.section-title{
  font-family:'Fraunces', serif;
  font-weight:400;
  font-size:24px;
  letter-spacing:-0.03em;
  color:var(--ink);
}
.section-title em{font-style:italic}
.section-meta{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13px;
  color:var(--muted);
  transition:color 0.4s ease;
}

.practice-row{
  position:relative;
  display:flex;align-items:center;gap:14px;
  padding:18px 18px;
  width:100%;
  text-align:left;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--hair);
  border-radius:16px;
  margin-bottom:6px;
  color:var(--ink);
  cursor:pointer;
  overflow:hidden;
  transition:all 0.5s var(--out-expo);
  -webkit-tap-highlight-color:transparent;
}
.practice-row:hover{background:rgba(255,255,255,0.75); transform:translateX(2px)}
.practice-row:active{transform:scale(0.985)}

.practice-row.done{
  /* BARE — no fill change. The check is the seal. */
  background:rgba(255,255,255,0.55);
  border:1px solid var(--hair);
  box-shadow:none;
}
.practice-row.sealing::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg, var(--blush-glow), var(--blush-deep));
  border-radius:18px;
  opacity:0;
  pointer-events:none;
  animation:seal-flash 0.65s var(--out-expo);
}
@keyframes seal-flash{
  0%{opacity:0;transform:scale(1)}
  35%{opacity:0.55;transform:scale(1)}
  100%{opacity:0;transform:scale(1)}
}

.practice-check{
  width:22px;height:22px;
  border-radius:7px;
  border:1.5px solid rgba(15,14,12,0.20);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:11px;font-weight:600;
  color:transparent;
  transition:all 0.45s var(--spring);
}
.practice-row.done .practice-check{
  background:var(--ink);
  border-color:var(--ink);
  color:var(--cream);
  animation:check-seal 0.6s var(--spring);
}
@keyframes check-seal{
  0%  {transform:rotate(-180deg) scale(0)}
  60% {transform:rotate(15deg) scale(1.18)}
  100%{transform:rotate(0) scale(1)}
}

.practice-text{
  flex:1;
  font-size:14.5px;
  color:var(--ink);
  line-height:1.35;
  letter-spacing:-0.005em;
  transition:all 0.5s var(--out-expo);
}
.practice-row.done .practice-text{
  /* Text stays intact — the check is the seal. */
  /* Slight opacity reduction to soften, but no strikethrough. */
  opacity:0.85;
}

/* ── Carried over (unsealed from previous day) ── */
.practice-row.carried{
  background:rgba(255,255,255,0.62);
  border-color:rgba(232,165,165,0.30);
}
.practice-body{flex:1;min-width:0}
.practice-eyebrow{
  font-family:'Fraunces',serif;font-style:italic;font-size:11px;
  color:var(--muted);
  margin-bottom:2px;
  letter-spacing:0.005em;
}

/* ── Editable practice input (non-carried slots) ── */
.practice-text-input{
  flex:1;width:100%;
  border:none;
  background:transparent;
  outline:none;
  font-family:'Inter Tight',sans-serif;
  font-size:14.5px;
  color:var(--ink);
  line-height:1.35;
  letter-spacing:-0.005em;
  padding:0;
  margin:0;
  resize:none;
  -webkit-appearance:none;
  appearance:none;
}
.practice-text-input::placeholder{
  color:var(--soft);
  font-family:'Fraunces',serif;
  font-style:italic;
  letter-spacing:-0.005em;
  opacity:0.75;
}
.practice-text-input:disabled{
  color:var(--ink);
  opacity:0.85;
}

/* Empty slot styling — quieter so the user knows it's waiting to be named */
.practice-row.empty{
  background:rgba(255,255,255,0.30);
  border-style:dashed;
  border-color:rgba(15,14,12,0.10);
}
.practice-row.empty:hover{
  background:rgba(255,255,255,0.50);
  border-color:rgba(15,14,12,0.16);
}
.practice-row.empty .practice-check{
  opacity:0.45;
}
.practice-check:disabled{
  cursor:default;
  opacity:0.45;
}
.practice-check:not(:disabled){
  cursor:pointer;
}

/* Since .practice-row is now a div (not a button), remove the button-only
   transforms on hover/active so the input doesn't shift while typing. */
.practice-row:hover{background:rgba(255,255,255,0.75); transform:none}
.practice-row:active{transform:none}
.practice-row.empty:hover{transform:none}

/* ════════════════════════════════════════════════
   SEALED TODAY — quiet record at the bottom of Home
   ════════════════════════════════════════════════ */
.sealed-eye{
  font-family:'Fraunces',serif;font-style:italic;font-size:11px;
  color:var(--soft);letter-spacing:0.05em;text-transform:uppercase;
  display:flex;align-items:center;gap:12px;
  margin:32px 0 14px;
}
.sealed-eye::before,.sealed-eye::after{
  content:'';flex:1;height:1px;background:var(--hair-soft);
}
.sealed-row{
  display:flex;align-items:center;gap:14px;
  padding:13px 18px;margin-bottom:5px;
}
.sealed-check{
  width:18px;height:18px;border-radius:5px;
  background:#FBE9E9;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  color:var(--ink);
  font-size:10px;font-weight:600;
}
.sealed-text{
  flex:1;
  font-size:14px;
  color:#BDB9B2;
  line-height:1.4;letter-spacing:-0.005em;
  font-weight:300;
}
.sealed-time{
  font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;
  color:#BDB9B2;
  flex-shrink:0;
}

/* ════════════════════════════════════════════════
   RITUAL PAIR — Morning / Evening
   ════════════════════════════════════════════════ */
.ritual-pair{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:0;
  margin-top:0;
}
.ritual-btn{
  position:relative;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--hair);
  border-radius:16px;
  padding:16px 16px 14px;
  text-align:left;
  cursor:pointer;
  overflow:hidden;
  transition:all 0.5s var(--out-expo);
  -webkit-tap-highlight-color:transparent;
}
.ritual-btn:hover{background:rgba(255,255,255,0.78); transform:translateY(-2px)}
.ritual-btn:active{transform:translateY(0) scale(0.985)}
.ritual-btn.done{
  background:rgba(245,207,207,0.22);
  border:1px solid rgba(232,165,165,0.18);
}
.ritual-btn.done::before{
  content:'';
  position:absolute;
  top:12px;right:12px;
  width:5px;height:5px;
  border-radius:999px;
  background:var(--blush-deep);
  animation:dot-pulse-soft 3s ease-in-out infinite;
}
@keyframes dot-pulse-soft{
  0%,100%{box-shadow:0 0 0 0 rgba(232,165,165,0.6)}
  50%{box-shadow:0 0 0 5px rgba(232,165,165,0)}
}

.ritual-icon{
  margin-bottom:10px;
  width:20px;height:20px;
  display:flex;align-items:center;
}
.ritual-icon svg{display:block; transition:transform 0.6s var(--out-expo);width:20px;height:20px}
.ritual-btn:hover .ritual-icon svg{transform:rotate(15deg)}
.ritual-name{
  font-family:'Fraunces', serif;
  font-weight:400;
  font-size:15px;
  letter-spacing:-0.02em;
  color:var(--ink);
  margin-bottom:2px;
}
.ritual-state{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:11px;
  color:var(--muted);
  letter-spacing:-0.005em;
}

/* ════════════════════════════════════════════════
   EXPANDED MORNING — when calibration data persists
   ════════════════════════════════════════════════ */
.ritual-expanded{
  grid-column:span 2;
  position:relative;
  background:rgba(245,207,207,0.22);
  border:1px solid rgba(232,165,165,0.18);
  border-radius:18px;
  padding:18px 20px;
  text-align:left;
  cursor:pointer;
  transition:all 0.5s var(--out-expo);
  -webkit-tap-highlight-color:transparent;
  width:100%;
  display:block;
}
.ritual-expanded:hover{transform:translateY(-2px)}
.ritual-expanded::after{
  content:'';position:absolute;top:14px;right:14px;
  width:5px;height:5px;border-radius:999px;
  background:var(--blush-deep);
  animation:dot-pulse-soft 3s ease-in-out infinite;
}

.exp-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:12px;padding-right:14px;
}
.exp-left{
  display:flex;align-items:center;gap:10px;
}
.exp-icon{
  width:22px;height:22px;display:flex;
  align-items:center;justify-content:center;
}
.exp-name{
  font-family:'Fraunces',serif;font-weight:400;font-size:16px;
  color:var(--ink);letter-spacing:-0.02em;
}
.exp-time{
  font-family:'Fraunces',serif;font-style:italic;font-size:10.5px;
  color:var(--muted);text-align:right;line-height:1.45;
}

.exp-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 11px;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--hair-soft);
  border-radius:999px;
  font-family:'Fraunces',serif;font-size:11px;
  color:var(--ink-soft);
  margin-bottom:10px;
}
.exp-pill-dot{
  width:5px;height:5px;border-radius:999px;
  background:var(--blush-deep);
}
.exp-pill-state{
  font-weight:500;color:var(--ink);font-style:normal;
  letter-spacing:-0.005em;
}
.exp-pill-energy{
  color:var(--muted);font-style:italic;
  letter-spacing:-0.005em;
}

.exp-suggestion{
  font-family:'Fraunces',serif;font-weight:400;font-size:13px;
  color:var(--ink-soft);line-height:1.55;font-style:italic;
  letter-spacing:-0.005em;
  padding:10px 13px;
  background:rgba(255,255,255,0.55);
  border-radius:11px;
  margin-bottom:12px;
}

.exp-actions{
  display:flex;justify-content:space-between;align-items:center;
}
.exp-label{
  font-family:'Fraunces',serif;font-style:italic;font-size:10px;
  color:var(--muted);letter-spacing:0.02em;
}
.exp-recalibrate{
  font-family:'Fraunces',serif;font-style:italic;font-size:11px;
  color:var(--ink);
  text-decoration:underline;
  text-decoration-color:rgba(15,14,12,0.18);
  text-underline-offset:3px;
  cursor:pointer;
  background:none;border:none;padding:0;
}
.exp-recalibrate:hover{color:var(--blush-deep);text-decoration-color:var(--blush-deep);}

/* The suggestion whisper — visible all day below the ritual pair */
.suggestion-whisper{
  display:block;
  width:100%;
  margin-top:10px;
  padding:14px 18px;
  background:rgba(245,207,207,0.10);
  border:1px solid rgba(232,165,165,0.12);
  border-radius:14px;
  font-family:'Fraunces',serif;font-style:italic;font-size:13px;
  color:var(--ink-soft);line-height:1.55;
  letter-spacing:-0.005em;text-align:center;
  cursor:pointer;
  transition:all 0.4s var(--out-expo);
  -webkit-tap-highlight-color:transparent;
}
.suggestion-whisper:hover{
  background:rgba(245,207,207,0.16);
  border-color:rgba(232,165,165,0.20);
  transform:translateY(-1px);
}

/* The state inline in the small card — Resistant · 2 */
.ritual-state-inline{
  font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;
  color:var(--muted);
}
.ritual-state-strong{
  font-style:normal;color:var(--ink);font-weight:500;
}

/* ════════════════════════════════════════════════
   DIVIDER
   ════════════════════════════════════════════════ */
.divider{
  display:flex;align-items:center;gap:14px;
  margin:0 0 26px;
}
.divider-line{flex:1; height:1px; background:var(--hair-soft)}
.divider-label{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:12px;
  color:var(--soft);
  letter-spacing:-0.005em;
}

/* ════════════════════════════════════════════════
   ARC RING — composite score
   ════════════════════════════════════════════════ */
.arc-section{
  text-align:center;
  margin-bottom:28px;
}
.ring-wrap{
  position:relative;
  display:inline-block;
}
.ring-svg{
  display:block;
  filter:drop-shadow(0 8px 24px rgba(232,165,165,0.14));
}
.ring-track-1, .ring-track-2, .ring-track-3{
  fill:none;
  stroke-opacity:0.10;
}
.ring-fill{
  fill:none;
  stroke-linecap:round;
  transition:stroke-dashoffset 1.6s var(--out-expo);
}
.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
}
.ring-value{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:54px;
  letter-spacing:-0.045em;
  line-height:1;
  color:var(--ink);
}
.ring-label{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
  letter-spacing:-0.005em;
}

.micro-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:38px;
}
.micro-stat{
  text-align:center;
  padding:18px 8px;
  background:rgba(255,255,255,0.45);
  border-radius:16px;
  border:1px solid var(--hair-soft);
  transition:all 0.4s var(--out-expo);
}
.micro-stat:hover{background:rgba(255,255,255,0.7); transform:translateY(-2px)}
.micro-dot{
  width:6px;height:6px;
  border-radius:999px;
  margin:0 auto 8px;
}
.micro-label{
  font-size:11px;
  color:var(--muted);
  letter-spacing:-0.005em;
  margin-bottom:6px;
}
.micro-value{
  font-family:'Fraunces', serif;
  font-weight:400;
  font-size:24px;
  color:var(--ink);
  letter-spacing:-0.02em;
}
.micro-value-unit{
  font-size:11px;
  color:var(--soft);
  margin-left:1px;
  font-weight:400;
}

/* ════════════════════════════════════════════════
   GOAL — what you're becoming
   ════════════════════════════════════════════════ */
.goal-card{
  position:relative;
  background:linear-gradient(180deg, rgba(245,207,207,0.20), rgba(245,207,207,0.05));
  border-radius:20px;
  padding:22px 22px;
  border:1px solid rgba(232,165,165,0.18);
  overflow:hidden;
}
.goal-card::before{
  content:'';
  position:absolute;
  top:-50%;right:-30%;
  width:180px;height:180px;
  background:radial-gradient(circle, rgba(232,165,165,0.12) 0%, rgba(232,165,165,0) 70%);
  pointer-events:none;
}
.goal-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:12.5px;
  color:var(--blush-deep);
  margin-bottom:10px;
  letter-spacing:-0.005em;
  position:relative;
}
.goal-text{
  font-family:'Fraunces', serif;
  font-weight:400;
  font-size:17px;
  color:var(--ink-soft);
  line-height:1.55;
  letter-spacing:-0.01em;
  position:relative;
  white-space:pre-line;
}

/* ════════════════════════════════════════════════
   BOTTOM NAV
   ════════════════════════════════════════════════ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(245,242,234,0.85);
  border-top:1px solid var(--hair);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:50;
}
.bnav-btn{
  flex:1;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0 10px;
  gap:4px;
  transition:all 0.3s var(--out-expo);
  color:var(--soft);
}
.bnav-btn.active{color:var(--ink)}
.bnav-icon{
  width:34px;height:34px;
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.3s ease;
  font-size:15px;
  font-family:'Fraunces', serif;
  font-weight:400;
}
.bnav-btn.active .bnav-icon{background:var(--blush)}
.bnav-label{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  font-weight:400;
}

/* ════════════════════════════════════════════════
   PILL BUTTONS
   ════════════════════════════════════════════════ */
.pill{
  width:100%;
  padding:18px 24px;
  font-size:15px;
  font-weight:500;
  letter-spacing:-0.005em;
  border-radius:999px;
  transition:transform 0.18s, opacity 0.18s, background 0.25s;
  cursor:pointer;
}
.pill:active{transform:scale(0.97)}
.pill-primary{background:var(--ink); color:var(--white)}
.pill-primary:hover{background:#000}
.pill-secondary{
  background:transparent;
  color:var(--ink);
  border:1px solid var(--hair-strong);
}
.pill-secondary:hover{border-color:rgba(15,14,12,0.25); background:rgba(255,255,255,0.5)}
.pill-pink{background:var(--blush); color:var(--ink)}
.pill-pink:hover{background:#EFB9B9}
.pill-danger{background:#B04040; color:var(--white)}

/* ════════════════════════════════════════════════
   SUB-PAGE HEADER
   ════════════════════════════════════════════════ */
.sub-hdr{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:24px 0 26px;
}
.sub-hdr-text{flex:1; padding-right:14px}
.sub-hdr-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:14.5px;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:-0.005em;
}
.sub-hdr-title{
  font-family:'Fraunces', serif;
  font-weight:400;
  font-size:30px;
  letter-spacing:-0.03em;
  line-height:1.1;
  color:var(--ink);
}
.sub-hdr-title em{font-style:italic}
.sub-hdr-close{
  width:36px;height:36px;
  border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  background:var(--white);
  border:1px solid var(--hair);
  font-size:20px;
  color:var(--muted);
  flex-shrink:0;
  margin-top:4px;
  transition:all 0.3s ease;
  cursor:pointer;
}
.sub-hdr-close:hover{background:var(--cream-deep)}
.sub-hdr-close:active{transform:scale(0.92)}

/* ════════════════════════════════════════════════
   FORM: inputs, select-cards, feel-cards, energy-bars
   ════════════════════════════════════════════════ */
.inp{
  width:100%;
  padding:22px 22px;
  font-size:16px;
  line-height:1.55;
  background:transparent;
  border:1px solid var(--hair);
  border-radius:18px;
  transition:border-color 0.4s var(--out-expo);
  color:var(--ink);
  font-family:'Inter Tight', sans-serif;
}
.inp::placeholder{
  color:var(--soft);
  font-style:italic;
  font-family:'Fraunces', serif;
}
.inp:focus{
  border-color:rgba(15,14,12,0.32);
  outline:none;
}

/* ── Hairline input — kept for cases where a very minimal inline field is needed.
   Currently unused in onboarding (Step 1 now uses .inp boxed style for consistency). */
.inp-hairline{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  border-bottom:1px solid var(--hair-strong);
  border-radius:0;
  padding:6px 0 16px 0;
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:32px;
  letter-spacing:-0.03em;
  line-height:1.1;
  color:var(--ink);
  transition:border-color 0.4s var(--out-expo);
  -webkit-appearance:none;
}
.inp-hairline:focus{
  border-bottom-color:var(--ink);
  box-shadow:none;
}
.inp-hairline::placeholder{
  color:var(--soft);
  font-style:italic;
}

.select-card{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px;
  background:transparent;
  border:1px solid var(--hair);
  border-radius:18px;
  width:100%;
  text-align:left;
  margin-bottom:10px;
  color:var(--ink);
  cursor:pointer;
  transition:all 0.3s var(--out-expo);
}
.select-card.active{
  background:rgba(245,207,207,0.16);
  border:1px solid rgba(232,165,165,0.32);
  box-shadow:none;
}
.select-card:active{transform:scale(0.985)}

.feel-card{
  padding:22px 14px;
  background:var(--white);
  border:1px solid var(--hair);
  border-radius:18px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;
  transition:all 0.3s var(--out-expo);
  color:var(--ink);
}
.feel-card.active{
  background:rgba(245,207,207,0.22);
  border:1px solid rgba(232,165,165,0.32);
}
.feel-card:active{transform:scale(0.97)}

.energy-bar{
  flex:1;height:64px;
  background:var(--white);
  border:1px solid var(--hair);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces', serif;
  font-size:22px;
  font-weight:400;
  color:var(--ink);
  cursor:pointer;
  transition:all 0.3s var(--out-expo);
}
.energy-bar.active{
  background:rgba(245,207,207,0.22);
  border:1px solid rgba(232,165,165,0.32);
}
.energy-bar:active{transform:scale(0.95)}

/* ════════════════════════════════════════════════
   MORNING CALIBRATION v2 — field tap, readout, protocol cards
   ════════════════════════════════════════════════ */
.field-zone{
  position:relative;
  margin:48px auto 32px;
  width:240px;height:240px;
}
.field-tap{
  width:100%;height:100%;
  background:linear-gradient(180deg, rgba(245,207,207,0.16) 0%, rgba(245,207,207,0) 50%, rgba(237,232,220,0.4) 100%);
  border:1px solid rgba(15,14,12,0.06);
  border-radius:20px;
  position:relative;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.field-tap::before, .field-tap::after{
  content:'';position:absolute;
  background:rgba(15,14,12,0.05);
  pointer-events:none;
}
.field-tap::before{left:8%;right:8%;top:50%;height:1px}
.field-tap::after{top:8%;bottom:8%;left:50%;width:1px}

.hint-dot{
  position:absolute;
  width:5px;height:5px;border-radius:999px;
  background:rgba(15,14,12,0.18);
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.tap-marker{
  position:absolute;
  width:32px;height:32px;border-radius:999px;
  background:var(--ink);
  border:3px solid var(--cream);
  transform:translate(-50%,-50%);
  box-shadow:0 4px 12px rgba(15,14,12,0.25);
  pointer-events:none;
  transition:top 0.25s var(--out-expo), left 0.25s var(--out-expo);
}

.field-label{
  position:absolute;
  font-family:'Fraunces',serif;font-style:italic;font-size:12px;
  color:var(--muted);
  pointer-events:none;
  letter-spacing:0.04em;
}
.field-label.top{top:-30px;left:50%;transform:translateX(-50%)}
.field-label.bottom{bottom:-30px;left:50%;transform:translateX(-50%)}
.field-label.left{left:-50px;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:center}
.field-label.right{right:-50px;top:50%;transform:translateY(-50%) rotate(90deg);transform-origin:center}

.field-readout{
  background:rgba(245,242,234,0.6);
  border-radius:14px;
  padding:14px 22px;
  text-align:center;
  margin-bottom:18px;
}
.field-readout.empty{background:rgba(245,242,234,0.45)}
.field-readout-state{
  font-family:'Fraunces',serif;font-style:italic;font-weight:400;
  font-size:18px;color:var(--ink);
}
.field-readout-state.empty{color:var(--soft);font-weight:300}

.step-pills{
  display:flex;justify-content:center;gap:6px;
  margin-top:auto;padding-top:18px;
}
.step-pill{
  width:24px;height:3px;border-radius:999px;
  background:rgba(15,14,12,0.1);
}
.step-pill.active{background:var(--ink-soft)}

/* Underneath input — Fraunces italic textarea */
.underneath-input{
  background:transparent;
  border:1px solid var(--hair);
  border-radius:18px;
  padding:18px 20px;
  font-family:'Inter Tight',sans-serif;
  font-weight:400;
  font-size:15px;
  color:var(--ink);
  line-height:1.5;
  min-height:120px;
  width:100%;
  font-style:normal;
  text-align:center;
  resize:none;
  outline:none;
  margin-bottom:14px;
  transition:border-color 0.4s var(--out-expo);
}
.underneath-input:focus{
  border-color:rgba(15,14,12,0.32);
}
.underneath-input::placeholder{
  color:var(--soft);
  font-style:italic;
  font-family:'Fraunces',serif;
}
.underneath-helper{
  font-family:'Fraunces',serif;font-style:italic;font-size:12px;
  color:var(--muted);text-align:center;margin-bottom:18px;
}
.underneath-skip{
  text-align:center;
  font-family:'Fraunces',serif;font-style:italic;
  font-size:13px;color:var(--muted);
  padding:14px;background:transparent;border:none;
  cursor:pointer;width:100%;
}
.underneath-skip:hover{color:var(--ink-soft)}

/* ── Underneath history — pattern recognition before the seal ──
   Lives at the bottom of Step 2. Shows last 3 underneath entries.
   Quiet, recessed — context, not foreground. */
.history-eye{
  font-family:'Fraunces',serif;font-style:italic;font-size:11px;
  color:var(--soft);letter-spacing:0.05em;text-transform:uppercase;
  display:flex;align-items:center;gap:14px;
  margin-top:24px;margin-bottom:14px;
}
.history-eye::before,.history-eye::after{
  content:'';flex:1;height:1px;background:var(--hair-soft);
}
.history-row{
  padding:14px 18px 16px;
  margin-bottom:8px;
  background:rgba(255,255,255,0.35);
  border:1px solid var(--hair);
  border-radius:14px;
}
.history-meta{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:6px;
}
.history-state{
  font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;
  color:var(--blush-deep);letter-spacing:0.02em;
}
.history-date{
  font-family:'Fraunces',serif;font-style:italic;font-size:11px;
  color:#BDB9B2;
}
.history-text{
  font-size:14px;
  color:#BDB9B2;
  line-height:1.5;letter-spacing:-0.005em;font-weight:300;
}

/* Recalibration "for [state]" sub-title */
.recal-for{
  font-family:'Fraunces',serif;font-size:18px;
  color:var(--ink-soft);
  margin-bottom:20px;margin-top:-6px;
}
.recal-for-prefix{
  font-style:italic;font-weight:300;
  color:var(--muted);font-size:14px;margin-right:6px;
}
.recal-for-state{
  font-style:italic;font-weight:400;color:var(--ink);font-size:22px;
}

/* Protocol cards — practice (blush) + mindset (cream) */
.protocol-card{
  background:rgba(245,207,207,0.16);
  border:1px solid rgba(232,165,165,0.16);
  border-radius:18px;
  padding:18px 18px 16px;
  margin-bottom:10px;
}
.protocol-card.mindset{
  background:rgba(245,242,234,0.55);
  border-color:var(--hair);
}
.protocol-eyebrow{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:11px;letter-spacing:0.06em;text-transform:lowercase;
  color:var(--blush-deep);margin-bottom:8px;
  opacity:0.85;
}
.protocol-card.mindset .protocol-eyebrow{color:var(--soft)}
.protocol-title{
  font-family:'Fraunces',serif;font-weight:400;
  font-size:16.5px;letter-spacing:-0.015em;
  color:var(--ink);line-height:1.25;margin-bottom:6px;
}
.protocol-body{
  font-family:'Fraunces',serif;font-weight:300;
  font-size:13px;color:var(--ink-soft);
  line-height:1.55;
}
.protocol-citation{
  margin-top:10px;padding-top:8px;
  border-top:1px solid rgba(232,165,165,0.18);
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:10.5px;color:var(--muted);
  line-height:1.4;
}

/* ════════════════════════════════════════════════
   EVENING v5 — gratitude · close · sealed · recall
   ════════════════════════════════════════════════ */

/* the evening screen wears its own atmosphere — warm copper top, deep ember bottom */
.evening-room{
  position:fixed;inset:0;
  z-index:50;
  display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse 110% 50% at 50% -5%, rgba(212,132,111,0.22) 0%, rgba(212,132,111,0) 50%),
    radial-gradient(ellipse 80% 40% at 50% 105%, rgba(229,168,147,0.10) 0%, rgba(229,168,147,0) 60%),
    linear-gradient(180deg, #1a1816 0%, #0E0C0A 100%);
  transition:opacity 1.4s ease;
  overflow:hidden;
}

/* film grain overlay — cotton-paper warmth even at night */
.evening-room::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3CfeColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.025 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;
  opacity:0.5;
  mix-blend-mode:multiply;
  z-index:1;
}

.evening-content{
  flex:1;
  padding:60px 32px 40px;
  display:flex;flex-direction:column;
  position:relative;z-index:2;
  overflow-y:auto;
}
.evening-content::-webkit-scrollbar{display:none}

.eve-greeting{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:13px;color:rgba(245,207,207,0.55);
  letter-spacing:0.04em;text-align:center;margin-bottom:6px;
  opacity:0;
  animation:eve-fade 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
}
.eve-greeting strong{color:rgba(245,207,207,0.78);font-weight:300;font-style:italic}

.eve-day-mark{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:12px;color:rgba(245,242,234,0.35);
  letter-spacing:0.16em;text-transform:uppercase;
  text-align:center;margin-bottom:48px;
  opacity:0;
  animation:eve-fade 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
}

.eve-q{
  font-family:'Fraunces',serif;font-weight:300;
  font-size:30px;letter-spacing:-0.035em;line-height:1.2;
  color:rgba(245,242,234,0.95);
  text-align:center;margin-bottom:14px;
  opacity:0;
  animation:eve-fade-up 1.6s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
}
.eve-q em{font-style:italic;color:#F5CFCF}

.eve-q-sub{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:14px;color:rgba(245,242,234,0.5);
  text-align:center;margin-bottom:34px;
  letter-spacing:-0.005em;line-height:1.55;
  opacity:0;
  animation:eve-fade 1.6s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
}

.eve-input-wrap{
  position:relative;
  margin-bottom:auto;
  opacity:0;
  animation:eve-fade-up 1.8s cubic-bezier(0.16,1,0.3,1) 1.8s forwards;
}
.eve-input-wrap:focus-within .eve-input-glow{opacity:1}
.eve-input-glow{
  position:absolute;inset:-20px;
  background:radial-gradient(ellipse,rgba(245,207,207,0.06) 0%,rgba(245,207,207,0) 60%);
  border-radius:24px;
  opacity:0;pointer-events:none;
  transition:opacity 1s ease;
}
.eve-input{
  position:relative;
  background:transparent;border:none;
  width:100%;outline:none;resize:none;
  color:rgba(245,242,234,0.95);
  font-family:'Fraunces',serif;font-weight:300;
  font-size:18px;line-height:1.6;
  letter-spacing:-0.005em;
  padding:18px 0;
  text-align:center;
  font-style:italic;
  caret-color:#E8A5A5;
  min-height:120px;
}
.eve-input::placeholder{
  color:rgba(245,242,234,0.18);font-style:italic;
}
.eve-input:not(:placeholder-shown){
  font-style:normal;color:rgba(245,242,234,0.95);
}
.eve-input-line{
  height:1px;width:60%;margin:0 auto;
  background:rgba(245,242,234,0.08);
  transition:all 1s ease;
}
.eve-input-wrap.has-text .eve-input-line{
  background:rgba(245,207,207,0.35);
  width:80%;
}

.eve-bottom{
  text-align:center;padding-top:36px;
  opacity:0;
  animation:eve-fade 2s cubic-bezier(0.16,1,0.3,1) 2.4s forwards;
}
.eve-bottom-eye{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:12px;color:rgba(245,207,207,0.4);
  letter-spacing:0.04em;margin-bottom:6px;
}
.eve-bottom-line{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:16px;color:rgba(245,242,234,0.65);
  letter-spacing:-0.005em;
}

.eve-close-btn{
  margin:22px auto 0;
  display:inline-block;
  font-family:'Fraunces',serif;font-style:italic;font-size:13px;
  color:rgba(245,207,207,0.65);
  background:rgba(245,207,207,0.06);
  border:1px solid rgba(245,207,207,0.18);
  border-radius:999px;
  padding:11px 26px;cursor:pointer;
  z-index:5;
  transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
  opacity:0;
  animation:eve-fade-up 1.8s cubic-bezier(0.16,1,0.3,1) 2.8s forwards;
}
.eve-close-btn:hover{
  background:rgba(245,207,207,0.12);
  border-color:rgba(245,207,207,0.32);
  color:rgba(245,207,207,0.85);
}
.eve-close-btn:active{transform:scale(0.96)}

/* SEALED ceremony — ember rises, the line speaks, then fades */
.eve-sealed-overlay{
  position:absolute;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% 70%, rgba(15,12,10,1) 0%, rgba(0,0,0,1) 100%);
  pointer-events:none;
  opacity:0;
}
.evening-room.sealing .eve-sealed-overlay{
  opacity:1;
  pointer-events:auto;
  transition:opacity 1.2s ease 0.3s;
}
.eve-ember{
  position:absolute;
  bottom:35%;left:50%;
  width:340px;height:340px;
  transform:translate(-50%,50%) scale(0);
  border-radius:999px;
  background:radial-gradient(circle,
    rgba(245,207,207,0.55) 0%,
    rgba(212,132,111,0.35) 25%,
    rgba(212,132,111,0.12) 50%,
    rgba(212,132,111,0) 75%);
  pointer-events:none;
  filter:blur(8px);
  mix-blend-mode:screen;
}
.evening-room.sealing .eve-ember{
  animation:eve-ember-rise 5s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
}
.eve-sealed-content{
  text-align:center;
  position:relative;z-index:2;
  opacity:0;padding:0 32px;
}
.evening-room.sealing .eve-sealed-content{
  animation:eve-sealed-appear 5s ease forwards;
}
.eve-sealed-eye{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:13px;color:rgba(245,207,207,0.6);
  letter-spacing:0.18em;text-transform:uppercase;
  margin-bottom:14px;
}
.eve-sealed-day{
  font-family:'Fraunces',serif;font-weight:300;
  font-size:64px;color:rgba(245,242,234,0.95);
  letter-spacing:-0.04em;line-height:1;margin-bottom:14px;
}
.eve-sealed-day em{font-style:italic;color:#F5CFCF}
.eve-sealed-line{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:18px;color:rgba(245,242,234,0.7);
  letter-spacing:-0.005em;line-height:1.5;
}

@keyframes eve-fade{from{opacity:0}to{opacity:1}}
@keyframes eve-fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes eve-ember-rise{
  0%{transform:translate(-50%,50%) scale(0);opacity:0}
  20%{opacity:1;transform:translate(-50%,30%) scale(0.9)}
  60%{transform:translate(-50%,-50%) scale(1.05);opacity:0.9}
  100%{transform:translate(-50%,-180%) scale(1.4);opacity:0}
}
@keyframes eve-sealed-appear{
  0%{opacity:0;transform:translateY(12px)}
  18%{opacity:1;transform:translateY(0)}
  82%{opacity:1}
  100%{opacity:0;transform:translateY(-6px)}
}

/* MORNING SEALED — light expanding ceremony (mirror of evening ember) */
.morning-sealed-overlay{
  position:fixed;inset:0;z-index:60;
  display:flex;align-items:center;justify-content:center;
  pointer-events:auto;
  /* Opaque dawn gradient — center brighter cream, edges warmer copper.
     Mirror of the evening overlay (which goes dark): morning floods with light. */
  background:radial-gradient(ellipse 95% 80% at 50% 45%,
    #FFF7EA 0%,
    #FAEAD3 38%,
    #ECC8AA 78%,
    #DDB395 100%);
  opacity:0;
  transform:none;
  animation:m-overlay-fade 5.2s ease forwards;
}
@keyframes m-overlay-fade{
  0%{opacity:0}
  18%{opacity:1}
  82%{opacity:1}
  100%{opacity:0}
}

/* The expanding light — born from center, opens outward */
.morning-sealed-light{
  position:absolute;
  top:50%;left:50%;
  width:80px;height:80px;
  border-radius:999px;
  transform:translate(-50%,-50%) scale(0);
  background:radial-gradient(circle,
    rgba(255,250,235,0.95) 0%,
    rgba(245,207,207,0.85) 18%,
    rgba(212,185,140,0.55) 38%,
    rgba(245,207,207,0.25) 60%,
    rgba(245,207,207,0) 80%);
  pointer-events:none;
  filter:blur(2px);
  mix-blend-mode:screen;
  animation:m-light-expand 5.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes m-light-expand{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;filter:blur(2px)}
  15%{transform:translate(-50%,-50%) scale(1);opacity:1;filter:blur(2px)}
  55%{transform:translate(-50%,-50%) scale(8);opacity:0.85;filter:blur(8px)}
  100%{transform:translate(-50%,-50%) scale(14);opacity:0;filter:blur(14px)}
}

/* Outer ring — subtle expanding circle */
.morning-sealed-ring{
  position:absolute;
  top:50%;left:50%;
  width:60px;height:60px;
  border-radius:999px;
  border:1.5px solid rgba(212,132,111,0.6);
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;
  animation:m-ring-expand 4.5s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
}
@keyframes m-ring-expand{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;border-width:1.5px}
  20%{opacity:0.7;border-width:1.5px}
  100%{transform:translate(-50%,-50%) scale(7);opacity:0;border-width:0.3px}
}

/* The poetic line — appears as light expands */
.morning-sealed-text{
  position:relative;z-index:2;
  text-align:center;
  padding:0 32px;
  opacity:0;
  animation:m-text-fade 5.2s ease forwards;
}
@keyframes m-text-fade{
  0%{opacity:0;transform:translateY(8px);filter:blur(4px)}
  20%{opacity:0;transform:translateY(8px);filter:blur(4px)}
  35%{opacity:1;transform:translateY(0);filter:blur(0)}
  82%{opacity:1;transform:translateY(0);filter:blur(0)}
  100%{opacity:0;transform:translateY(-4px);filter:blur(2px)}
}
.morning-sealed-eye{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:13px;color:rgba(15,14,12,0.55);
  letter-spacing:0.18em;text-transform:uppercase;
  margin-bottom:14px;
}
.morning-sealed-line-1{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:30px;color:var(--ink);
  letter-spacing:-0.025em;line-height:1;
  margin-bottom:10px;
}
.morning-sealed-line-1 em{font-style:italic;color:var(--copper)}
.morning-sealed-line-2{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:18px;color:var(--ink-soft);
  letter-spacing:-0.005em;line-height:1.4;
}
.morning-sealed-line-2 em{font-style:italic;color:var(--copper)}

/* MORNING RECALL — the gratitude card on next-day dashboard */
.morning-recall{
  position:relative;
  background:linear-gradient(135deg,rgba(245,207,207,0.25) 0%,rgba(212,132,111,0.10) 100%);
  border:1px solid rgba(232,165,165,0.22);
  border-radius:24px;
  padding:24px 24px 22px;
  margin-bottom:24px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(232,165,165,0.08);
  cursor:default;
}
.morning-recall::before{
  content:'';position:absolute;
  top:-30%;right:-20%;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(232,165,165,0.18) 0%,rgba(232,165,165,0) 70%);
  pointer-events:none;
}
.morning-recall-eye{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:11.5px;color:#D4846F;
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:14px;
  position:relative;
}
.morning-recall-quote{
  font-family:'Fraunces',serif;font-weight:300;font-style:italic;
  font-size:18px;color:#3D3A35;
  letter-spacing:-0.01em;line-height:1.5;
  position:relative;
}
.morning-recall-quote::before{
  content:'\201C';
  font-family:'Fraunces',serif;
  color:#E8A5A5;
  font-size:32px;line-height:0;
  position:relative;top:6px;margin-right:4px;
}
.morning-recall-quote::after{
  content:'\201D';
  font-family:'Fraunces',serif;
  color:#E8A5A5;
  font-size:32px;line-height:0;
  position:relative;top:10px;margin-left:2px;
}

/* ════════════════════════════════════════════════
   GENERIC CARDS
   ════════════════════════════════════════════════ */
.card{
  background:var(--white);
  border:1px solid var(--hair-soft);
  border-radius:20px;
  padding:24px;
}
.card-cream{
  background:var(--cream-deep);
  border-radius:18px;
  padding:22px;
}
.card-soft{
  background:var(--cream-soft);
  border-radius:16px;
  padding:20px;
  border:1px solid var(--hair-soft);
}

.badge{
  display:inline-block;
  padding:5px 12px;
  background:var(--blush);
  border-radius:999px;
  font-size:12px;
  color:var(--ink);
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  letter-spacing:-0.005em;
}

.stat-box{
  padding:20px 16px;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--hair-soft);
  border-radius:16px;
}

/* ════════════════════════════════════════════════
   LESSON DETAIL — full-screen deep ink room
   ════════════════════════════════════════════════ */
.deep-room{
  min-height:100vh;
  min-height:-webkit-fill-available;
  background:var(--ink);
  color:var(--cream);
  position:relative;
  overflow:hidden;
}
/* Atmospheric warmth in the deep room */
.deep-room::before{
  content:'';
  position:fixed;
  top:-20%;right:-20%;
  width:400px;height:400px;
  background:radial-gradient(circle, rgba(245,207,207,0.10) 0%, rgba(245,207,207,0) 65%);
  pointer-events:none;
  z-index:0;
  animation:bloom-drift-a 16s ease-in-out infinite alternate;
}
.deep-room::after{
  content:'';
  position:fixed;
  bottom:-25%;left:-25%;
  width:350px;height:350px;
  background:radial-gradient(circle, rgba(212,132,111,0.07) 0%, rgba(212,132,111,0) 70%);
  pointer-events:none;
  z-index:0;
  animation:bloom-drift-b 20s ease-in-out 4s infinite alternate-reverse;
}
.deep-screen{
  position:relative;z-index:2;
  width:100%;
  max-width:430px;
  margin:0 auto;
  padding:env(safe-area-inset-top) 24px 110px;
}
.deep-screen .sub-hdr-title{color:var(--cream)}
.deep-screen .sub-hdr-eyebrow{color:rgba(245,207,207,0.65)}
.deep-screen .sub-hdr-close{
  background:rgba(255,255,255,0.05);
  border-color:rgba(255,255,255,0.10);
  color:var(--cream);
}

.deep-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:14.5px;
  color:var(--blush);
  margin-bottom:14px;
  letter-spacing:-0.005em;
}

.deep-title{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:38px;
  letter-spacing:-0.04em;
  line-height:1.05;
  color:var(--cream);
  margin-bottom:24px;
}
.deep-title em{font-style:italic; color:var(--blush); font-weight:400}

.deep-body{
  font-size:16px;
  line-height:1.7;
  color:rgba(245,242,234,0.82);
  font-weight:300;
  margin-bottom:24px;
}
.deep-body strong{color:var(--cream); font-weight:400}
.deep-body em{font-style:italic}

.deep-citation{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13px;
  color:rgba(245,207,207,0.55);
  margin-bottom:32px;
  padding-left:16px;
  border-left:1px solid rgba(245,207,207,0.25);
}

.deep-application{
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:24px;
  margin-bottom:32px;
  border:1px solid rgba(255,255,255,0.06);
}
.deep-application-eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:12px;
  color:var(--blush);
  margin-bottom:10px;
  letter-spacing:-0.005em;
}
.deep-application-text{
  font-size:15px;
  line-height:1.65;
  color:rgba(245,242,234,0.88);
  font-weight:300;
}

.deep-cta{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 28px;
  background:var(--blush);
  color:var(--ink);
  border-radius:999px;
  font-family:'Inter Tight', sans-serif;
  font-weight:500;
  font-size:14.5px;
  letter-spacing:-0.005em;
  cursor:pointer;
  transition:all 0.3s ease;
}
.deep-cta:hover{background:var(--blush-glow)}
.deep-cta:active{transform:scale(0.97)}

/* ════════════════════════════════════════════════
   THE EXHALE — signature evening seal moment
   ════════════════════════════════════════════════ */
.exhale-overlay{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:0;
}
.exhale-overlay.firing{animation:exhale-fire 4.5s var(--out-expo) forwards}
.exhale-overlay::before{
  content:'';
  position:absolute;
  top:-50%;left:0;right:0;height:200%;
  background:linear-gradient(
    180deg,
    transparent 0%,
    transparent 28%,
    rgba(245,207,207,0.42) 44%,
    rgba(232,165,165,0.55) 50%,
    rgba(245,207,207,0.42) 56%,
    transparent 72%,
    transparent 100%
  );
}
@keyframes exhale-fire{
  0%  {opacity:0; transform:translateY(-50%)}
  18% {opacity:1}
  82% {opacity:1}
  100%{opacity:0; transform:translateY(50%)}
}

/* ════════════════════════════════════════════════
   HEATMAP
   ════════════════════════════════════════════════ */
.heat-grid{
  display:grid;grid-template-columns:repeat(10,1fr);
  gap:5px;
}
.heat-cell{
  aspect-ratio:1;
  border-radius:5px;
  transition:transform 0.2s ease;
}
.heat-cell.empty{background:transparent; border:1px solid var(--hair-soft)}
.heat-cell.lvl-0{background:var(--cream-deep)}
.heat-cell.lvl-1{background:#F9E1E1}
.heat-cell.lvl-2{background:var(--blush)}
.heat-cell.lvl-3{background:var(--blush-deep)}
.heat-cell.today{outline:2px solid var(--ink); outline-offset:1px}

/* ════════════════════════════════════════════════
   ONBOARDING-ONLY
   ════════════════════════════════════════════════ */
.onb-eyebrow{
  display:inline-block;
  padding:6px 14px;
  background:var(--blush);
  border-radius:999px;
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13px;
  color:var(--ink);
  letter-spacing:-0.005em;
  margin-bottom:32px;
}
.onb-hero{
  font-family:'Fraunces', serif;
  font-weight:300;
  font-size:54px;
  letter-spacing:-0.045em;
  line-height:1;
  color:var(--ink);
  margin-bottom:20px;
}
.onb-hero em{font-style:italic}
.onb-sub{
  font-size:16px;
  color:var(--muted);
  line-height:1.6;
  font-weight:400;
  max-width:340px;
  margin-bottom:36px;
}
.onb-statement{
  display:flex;gap:18px;align-items:flex-start;
  margin-bottom:24px;
}
.onb-statement-num{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:400;
  font-size:15px;
  color:var(--blush-deep);
  min-width:26px;
  margin-top:2px;
}
.onb-statement-title{

.wisdom-room{

  overflow:hidden;
}
.wisdom-room::before{
  content:'';

  z-index:0;
  animation:bloom-drift-a 16s ease-in-out infinite alternate;
}
.wisdom-room::after{
  content:'';
  position:fixed;
  bottom:-20%;left:-20%;
  width:320px;height:320px;
  background:radial-gradient(circle, rgba(212,132,111,0.06) 0%, rgba(212,132,111,0) 70%);
  pointer-events:none;
  z-index:0;
  animation:bloom-drift-b 20s ease-in-out 4s infinite alternate-reverse;
}

.wisdom-screen{

/* Tabs (deep ink variant) */

}
.wisdom-tab{

  font-weight:400;

}

}

/* Movement divider */

}

  font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;
