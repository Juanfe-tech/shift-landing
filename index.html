/* ════════════════════════════════════════════════
   JOURNAL (Log)
   ════════════════════════════════════════════════ */
const Log = ({data, onSave, onBack, currentDay}) => {
  // 'home' | 'calibrate' | 'improve'
  const [stage, setStage] = useState('home');
  const [draft, setDraft] = useState('');
  const [pending, setPending] = useState(null); // {originalText, quality}
  const [improvedText, setImprovedText] = useState('');
  const [anchoring, setAnchoring] = useState(false);

  const entries = data.journal || [];
  const totalCount = entries.length;

  // Quality counts for mosaic stats
  const counts = useMemo(() => {
    const c = {copper:0, pink:0, green:0, gold:0};
    entries.forEach(en => { if(en.color && c[en.color] !== undefined) c[en.color]++; });
    return c;
  }, [entries]);

  // Group entries by day for list view
  const byDay = useMemo(() => {
    const groups = {};
    [...entries].reverse().forEach(en => {
      const d = en.day || 1;
      if(!groups[d]) groups[d] = [];
      groups[d].push(en);
    });
    return groups;
  }, [entries]);

  // Helper to go to calibrate stage
  const goToCalibrate = () => {
    if(!draft.trim()) return;
    setPending({originalText: draft.trim()});
    setStage('calibrate');
    haptic(6);
  };

  // Quality selected
  const onQualitySelected = (color) => {
    haptic(8);
    if(color === 'copper' || color === 'pink'){
      // Need rewrite — go to improve stage
      setPending({...pending, quality:color});
      setStage('improve');
    } else {
      // Save directly
      const entry = {
        originalText: pending.originalText,
        improvedText: null,
        color: color,
        at: new Date().toISOString(),
        day: currentDay || 1
      };
      onSave(entry);
      // Reset & go home
      setDraft('');
      setPending(null);
      setImprovedText('');
      setStage('home');
    }
  };

  // Anchor improved version — ceremony fires, then saves and returns home
  const onAnchor = () => {
    if(!improvedText.trim() || anchoring) return;
    setAnchoring(true);
    playChime();
    haptic([20, 80, 30, 80, 30]);
    // Ceremony — concentric ripples + orb bloom + text appears.
    // 3.5s feels right: long enough to feel sacred, short enough not to interrupt flow.
    setTimeout(() => {
      const entry = {
        originalText: pending.originalText,
        improvedText: improvedText.trim(),
        color: pending.quality, // copper or pink — the entry shows in its original color with rewrite below
        at: new Date().toISOString(),
        day: currentDay || 1
      };
      onSave(entry);
      setDraft('');
      setPending(null);
      setImprovedText('');
      setAnchoring(false);
      setStage('home');
    }, 3500);
  };

  // Time formatter — "2:14 pm"
  const fmtTime = (iso) => {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}).toLowerCase();
  };

  // ─── HOME STAGE ───
  if(stage === 'home'){
    return Screen({stagger:true},
        // Header
        div({className:'log-home-head'},
          div({className:'log-home-top'},
            div({className:'log-home-meta'}, `Day ${currentDay}`),
          ),
          div({className:'log-home-title'}, 'The ', e('em',null,'log'), '.'),
          div({className:'log-home-count'}, `${totalCount} ${totalCount === 1 ? 'thought' : 'thoughts'} caught`)
        ),

        // Inline write
        div({className:'log-write'},
          div({className:'log-write-mark'}, 'a thought arrived'),
          div({className:'log-write-box'},
            ta({
              className:'log-write-area',
              rows:3,
              value:draft,
              placeholder:'Unedited. As it came.',
              onInput:ev=>setDraft(ev.target.value),
            })
          ),
          div({className:'log-write-actions'},
            btn({
              className:'log-btn-primary',
              onClick:goToCalibrate,
              disabled:!draft.trim()
            }, 'Log')
          )
        ),

        // Archive
        div({className:'log-archive'},
          totalCount === 0 && div({className:'log-empty'},
            'Your thoughts will collect here. Each one calibrated, colored, and visible.'
          ),
          ...Object.keys(byDay)
            .sort((a,b) => parseInt(b) - parseInt(a))
            .map(day => {
              const isToday = parseInt(day) === currentDay;
              const isYesterday = parseInt(day) === currentDay - 1;
              const dayName = isToday ? 'today' : (isYesterday ? 'yesterday' : '');
              return div({key:day},
                div({className:'log-day-marker'},
                  span(null,`Day ${day}`),
                  dayName && span({className:'log-day-name'}, dayName)
                ),
                ...byDay[day].map((en, i) => {
                  // Backwards compat: old entries have .text, new have .originalText
                  const text = en.originalText || en.text || '';
                  const color = en.color || 'pink';
                  return div({key:`${day}-${i}`, className:`log-thought ${color}`},
                    div({className:'log-thought-time'}, fmtTime(en.at)),
                    en.improvedText ?
                      [
                        div({key:'orig', className:'log-thought-original'}, `"${text}"`),
                        div({key:'imp', className:'log-thought-improved'}, `"${en.improvedText}"`)
                      ] :
                      div({className:'log-thought-text'}, `"${text}"`)
                  );
                })
              );
            })
        )
      );  }

  // ─── CALIBRATE STAGE ───
  if(stage === 'calibrate'){
    return Screen({stagger:true},
      SubHdr({eyebrow:`Day ${currentDay}`, title:e('span',null,'The ',e('em',null,'log'),'.'), onClose:()=>{setStage('home');setPending(null);}}),
      div({style:{padding:'14px 26px 0'}},
        div({className:'log-calibrate-quote'}, `"${pending.originalText}"`),
        div({className:'log-calibrate-q'}, 'What kind of ', e('em',null,'thought'), ' is this?'),
        div({className:'log-calibrate-options'},
          btn({className:'log-quality-opt copper', onClick:()=>onQualitySelected('copper')},
            div({className:'log-quality-dot copper'}),
            div({className:'log-quality-text'}, 'Not so good',
              div({className:'log-quality-sub'}, 'the saboteur')
            )
          ),
          btn({className:'log-quality-opt pink', onClick:()=>onQualitySelected('pink')},
            div({className:'log-quality-dot pink'}),
            div({className:'log-quality-text'}, 'Acceptable',
              div({className:'log-quality-sub'}, 'neutral, no weight')
            )
          ),
          btn({className:'log-quality-opt green', onClick:()=>onQualitySelected('green')},
            div({className:'log-quality-dot green'}),
            div({className:'log-quality-text'}, 'Good',
              div({className:'log-quality-sub'}, 'adds to you')
            )
          ),
          btn({className:'log-quality-opt gold', onClick:()=>onQualitySelected('gold')},
            div({className:'log-quality-dot gold'}),
            div({className:'log-quality-text'}, 'The version',
              div({className:'log-quality-sub'}, "who you're becoming")
            )
          )
        )
      )
    );
  }

  // ─── IMPROVE STAGE ───
  return Screen({stagger:true},
    SubHdr({eyebrow:`Day ${currentDay}`, title:e('span',null,'The ',e('em',null,'log'),'.'), onClose:()=>{setStage('home');setPending(null);setImprovedText('');}}),
    div({style:{padding:'14px 26px 0'}},
      div({className:'log-improve-label'}, 'your original thought'),
      div({className:'log-improve-original'}, `"${pending.originalText}"`),
      div({className:'log-improve-q'}, 'What would ', e('em',null,'the version'), " you're becoming say?"),
      div({className:'log-improve-box'},
        ta({
          className:'log-improve-area',
          rows:3,
          value:improvedText,
          placeholder:'Rewrite it. Just once.',
          onInput:ev=>setImprovedText(ev.target.value),
        })
      ),
      div({className:'log-improve-actions'},
        btn({
          className:'log-btn-primary',
          onClick:onAnchor,
          disabled:!improvedText.trim() || anchoring
        }, anchoring ? 'anchoring\u2026' : 'Anchor!')
      )
    ),

    // ─── ANCHOR CEREMONY OVERLAY ──────────────────
    // Fires when user anchors a rewritten thought.
    // Concentric ripples expand outward (like dropping a stone in still water),
    // a golden orb blooms at center, a poetic line appears.
    // The metaphor: speaking to the field. Vibrations sent.
    anchoring && fr(
      div({className:'anchor-overlay'},

        div({className:'anchor-orb'}),
        div({className:'anchor-text'},

        )
      )
    )
  );
};

/* ════════════════════════════════════════════════
   PROGRESS — Arc of change
   Two tabs: "your thoughts" (synaptic constellation) +
             "your progress" (4 cumulative rings).
   Dark mind-space backdrop. Mission modal overlay.
   ════════════════════════════════════════════════ */
const Progress = ({data, onBack, currentDay, identityScore, con, act, clean}) => {
  const ci = data.checkIns || [];
  const totalActions = (data.actions || []).length || 1;

  // ─── Local state ───
  const [tab, setTab] = useState('thoughts'); // 'thoughts' | 'progress'
  const [missionOpen, setMissionOpen] = useState(false);
  const [ringsDrawn, setRingsDrawn] = useState(false);
  const constellationRef = useRef(null);

  // ─── Lifecycle: dark body class + auto-open mission on first visit ───
  useEffect(() => {
    document.body.classList.add('dark-arc');
    let openTimer = null;
    try{
      if(!localStorage.getItem('mission_intro_seen')){
        openTimer = setTimeout(() => {
          setMissionOpen(true);
          try{ localStorage.setItem('mission_intro_seen', '1'); }catch(e){}
        }, 800);
      }
    }catch(e){}
    return () => {
      document.body.classList.remove('dark-arc');
      if(openTimer) clearTimeout(openTimer);
    };
  }, []);

  // ─── Rings draw-on-mount animation flag ───
  useEffect(() => {
    if(tab !== 'progress'){ setRingsDrawn(false); return; }
    const t = setTimeout(() => setRingsDrawn(true), 50);
    return () => clearTimeout(t);
  }, [tab]);

  // ─── Thought stats ───
  const thoughts = data.journal || [];
  const totalThoughts = thoughts.length;
  const thoughtCounts = useMemo(() => {
    const c = {copper:0, pink:0, green:0, gold:0};
    thoughts.forEach(t => { if(t.color && c[t.color] !== undefined) c[t.color]++; });
    return c;
  }, [thoughts]);

  // ─── Cumulative ring metrics (recomputed here per the new design) ───
  // Days: simple ratio of currentDay / 90
  const daysPct = Math.min((currentDay / 90) * 100, 100);

  // Consistency: % of days morning was sealed (out of currentDay days elapsed)
  const consistencyPct = useMemo(() => {
    if(currentDay <= 0) return 0;
    const morningSealed = ci.filter(c => c.morning).length;
    return Math.round(Math.min((morningSealed / currentDay) * 100, 100));
  }, [ci, currentDay]);

  // Action: % of total practices completed (out of currentDay × totalActions)
  const actionPct = useMemo(() => {
    if(currentDay <= 0 || totalActions <= 0) return 0;
    const totalCompleted = ci.reduce((s,c) => s + (c.actionsCompleted || 0), 0);
    const totalPossible = currentDay * totalActions;
    if(!totalPossible) return 0;
    return Math.round(Math.min((totalCompleted / totalPossible) * 100, 100));
  }, [ci, currentDay, totalActions]);

  // Clean: % of all logged thoughts that are "the version" (gold)
  const cleanPct = useMemo(() => {
    if(!totalThoughts) return 0;
    return Math.round((thoughtCounts.gold / totalThoughts) * 100);
  }, [totalThoughts, thoughtCounts]);

  // Composite — equal-weight average of the four rings
  const composite = Math.round((daysPct + consistencyPct + actionPct + cleanPct) / 4);

  // Sealed days (all 4 metrics fully closed for that day's data)
  const sealedCount = useMemo(() => {
    return ci.filter(c => {
      const ritualsClosed = !!(c.morning && c.evening);
      const allActionsDone = (c.actionsCompleted || 0) >= totalActions;
      const dayThoughts = thoughts.filter(t => t.day === c.day);
      const cleanDay = dayThoughts.length >= 3 &&
        dayThoughts.filter(t => t.color === 'gold').length / dayThoughts.length >= 0.5;
      return ritualsClosed && allActionsDone && cleanDay;
    }).length;
  }, [ci, totalActions, thoughts]);

  // ═══ Constellation rendering (imperative SVG, in useEffect) ═══
  useEffect(() => {
    if(tab !== 'thoughts' || !constellationRef.current) return;

    const svg = constellationRef.current;
    // Remove old children except <defs> and the nebula <rect>
    const keep = new Set(['defs', 'rect']);
    Array.from(svg.children).forEach(child => {
      if(!keep.has(child.tagName.toLowerCase())) svg.removeChild(child);
    });

    const cx = 160, cy = 160;
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    const scale = 10.5;
    const TOTAL_SLOTS = 200;

    // Seeded PRNG for stable layout across re-renders
    let seed = 42;
    const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

    // Phyllotaxis positions
    const allSlots = [];
    for(let i = 0; i < TOTAL_SLOTS; i++){
      const r = scale * Math.sqrt(i + 1);
      const angle = i * goldenAngle;
      const jx = (rand() - 0.5) * 3;
      const jy = (rand() - 0.5) * 3;
      allSlots.push({
        x: cx + r * Math.cos(angle) + jx,
        y: cy + r * Math.sin(angle) + jy,
        sizeMult: 0.7 + rand() * 0.6
      });
    }

    // Color palette by data key
    const typeColors = {
      copper: {core:'#C44747', glow:'#DC5C5C'}, // saboteur → red
      pink:   {core:'#E8A5A5', glow:'#F5C5C5'}, // acceptable → pink
      green:  {core:'#9BBA9D', glow:'#B5DAB7'}, // good → green
      gold:   {core:'#F5D080', glow:'#FFE8B8'}  // version → gold
    };

    // Identify today's last logged thought (if any)
    const todayLastIdx = (() => {
      for(let i = thoughts.length - 1; i >= 0; i--){
        if(thoughts[i].day === currentDay) return i;
      }
      return -1;
    })();

    // Lit positions = each logged thought
    const positions = thoughts.map((th, i) => {
      const slot = allSlots[Math.min(i, allSlots.length - 1)];
      return {
        x: slot.x, y: slot.y,
        type: th.color || 'pink',
        isToday: th.day === currentDay,
        isTodayLast: i === todayLastIdx,
        sizeMult: 0.78 + rand() * 0.45,
        twinkle: th.day !== currentDay && rand() < 0.12,
        twinkleDelay: rand() * 4
      };
    });

    // Dim slots = unfilled potential
    const dimSlots = allSlots.slice(thoughts.length);
    const ns = 'http://www.w3.org/2000/svg';

    // Layer 0: dim potential dots
    dimSlots.forEach(slot => {
      const dot = document.createElementNS(ns, 'circle');
      dot.setAttribute('cx', slot.x);
      dot.setAttribute('cy', slot.y);
      dot.setAttribute('r', 1.5 * slot.sizeMult);
      dot.setAttribute('fill', 'rgba(245,242,234,0.18)');
      svg.appendChild(dot);
    });

    // Layer 1: synapses (consecutive lit positions)
    const synapseLines = [];
    for(let i = 1; i < positions.length; i++){
      const prev = positions[i - 1];
      const curr = positions[i];
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', prev.x);
      line.setAttribute('y1', prev.y);
      line.setAttribute('x2', curr.x);
      line.setAttribute('y2', curr.y);
      line.setAttribute('stroke', 'rgba(245,207,207,0.18)');
      line.setAttribute('stroke-width', 0.6);
      line.classList.add('synapse');
      svg.appendChild(line);
      synapseLines.push({prev, curr});
    }

    // Layer 2: neurons (lit stars)
    positions.forEach(pos => {
      const colors = typeColors[pos.type] || typeColors.pink;
      // Halo
      const baseHaloR = pos.isTodayLast ? 14 : (pos.isToday ? 8 : 5);
      const halo = document.createElementNS(ns, 'circle');
      halo.setAttribute('cx', pos.x);
      halo.setAttribute('cy', pos.y);
      halo.setAttribute('r', baseHaloR * pos.sizeMult);
      halo.setAttribute('fill', colors.glow);
      halo.setAttribute('opacity', pos.isTodayLast ? 0.32 : (pos.isToday ? 0.20 : 0.13));
      halo.style.filter = 'blur(4px)';
      svg.appendChild(halo);
      // Core
      const baseCoreR = pos.isTodayLast ? 5.5 : (pos.isToday ? 3.6 : 2.6);
      const core = document.createElementNS(ns, 'circle');
      core.setAttribute('cx', pos.x);
      core.setAttribute('cy', pos.y);
      core.setAttribute('r', baseCoreR * pos.sizeMult);
      core.setAttribute('fill', colors.core);
      core.classList.add('neuron');
      if(pos.isTodayLast){
        core.classList.add('neuron-today-last');
        core.style.color = colors.glow;
      } else {
        core.style.filter = 'drop-shadow(0 0 3px ' + colors.glow + ')';
        if(pos.twinkle){
          core.classList.add('twinkle');
          core.style.animationDelay = pos.twinkleDelay + 's';
        }
      }
      svg.appendChild(core);
    });

    // Layer 3: traveling pulses every 1.5–3.5s
    let cancelled = false;
    let pulseTimer = null;
    const firePulse = () => {
      if(cancelled || synapseLines.length === 0) return;
      const synapse = synapseLines[Math.floor(Math.random() * synapseLines.length)];
      const pulse = document.createElementNS(ns, 'circle');
      pulse.setAttribute('r', 1.8);
      pulse.setAttribute('fill', '#FFE8B8');
      pulse.setAttribute('opacity', 0);
      pulse.style.filter = 'drop-shadow(0 0 4px rgba(255,232,184,0.95)) drop-shadow(0 0 8px rgba(255,232,184,0.6))';
      svg.appendChild(pulse);
      const duration = 700;
      const startTime = performance.now();
      const animate = (now) => {
        if(cancelled){ pulse.remove(); return; }
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        const x = synapse.prev.x + (synapse.curr.x - synapse.prev.x) * ease;
        const y = synapse.prev.y + (synapse.curr.y - synapse.prev.y) * ease;
        pulse.setAttribute('cx', x);
        pulse.setAttribute('cy', y);
        let opacity;
        if(t < 0.15) opacity = t / 0.15;
        else if(t > 0.85) opacity = (1 - t) / 0.15;
        else opacity = 1;
        pulse.setAttribute('opacity', opacity);
        if(t < 1) requestAnimationFrame(animate);
        else pulse.remove();
      };
      requestAnimationFrame(animate);
    };
    const schedule = () => {
      if(cancelled) return;
      const delay = 1500 + Math.random() * 2000;
      pulseTimer = setTimeout(() => { firePulse(); schedule(); }, delay);
    };
    if(synapseLines.length > 0) pulseTimer = setTimeout(schedule, 1000);

    return () => {
      cancelled = true;
      if(pulseTimer) clearTimeout(pulseTimer);
    };
  }, [tab, thoughts, currentDay]);

  // ─── Export ───
  const exportData = () => {
    const blob = new Blob([JSON.stringify({app:'SHIFT', v:5.1, exported:new Date().toISOString(), data}, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'shift-backup-' + todayISO() + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // ─── Ring math (for progress tab) ───
  const ringR = [120, 100, 80, 60];
  const fullLens = ringR.map(r => 2 * Math.PI * r);
  const ringPcts = [
    Math.min(daysPct, 100),
    Math.min(consistencyPct, 100),
    Math.min(actionPct, 100),
    Math.min(cleanPct, 100)
  ];
  const ringOffsets = ringPcts.map((pct, i) =>
    ringsDrawn ? fullLens[i] * (1 - pct / 100) : fullLens[i]
  );

  return div({className:'arc-screen'},
    // Header
    div({className:'arc-header'},
      div({className:'arc-header-eyebrow'}, 'your network'),
      btn({className:'arc-header-close', onClick:onBack, 'aria-label':'Close'}, '×')
    ),
    div({className:'arc-page-title'},
      'Arc of ', e('em', null, 'change'), '.'
    ),
    // Tabs
    div({className:'arc-tabs'},
      btn({
        className:'arc-tab ' + (tab === 'thoughts' ? 'active' : ''),
        onClick: () => setTab('thoughts')
      }, 'your thoughts'),
      btn({
        className:'arc-tab ' + (tab === 'progress' ? 'active' : ''),
        onClick: () => setTab('progress')
      }, 'your progress')
    ),

    // ═══ THOUGHTS TAB ═══
    tab === 'thoughts' && fr(
      div({className:'arc-meta'},
        span(null, 'day ' + currentDay + ' of 90'),
        span(null, totalThoughts + ' ' + (totalThoughts === 1 ? 'thought' : 'thoughts') + ' caught')
      ),
      div({className:'constellation-wrap'},
        e('svg', {
          ref: constellationRef,
          className: 'constellation-svg',
          width: 320, height: 320, viewBox: '0 0 320 320'
        },
          e('defs', null,
            e('radialGradient', {id:'arc-nebula', cx:'50%', cy:'50%'},
              e('stop', {offset:'0%', stopColor:'rgba(232,137,108,0.05)'}),
              e('stop', {offset:'60%', stopColor:'rgba(232,137,108,0)'})
            )
          ),
          e('rect', {x:0, y:0, width:320, height:320, fill:'url(#arc-nebula)'})
        )
      ),
      totalThoughts === 0 && div({className:'constellation-empty'},
        'Your galaxy starts empty. Each thought you log lights a star.'
      ),
      btn({className:'mission-open-btn', onClick:() => setMissionOpen(true)},
        span({className:'mission-star'}, '✦'),
        span(null, 'your mission'),
        span({className:'mission-star'}, '✦')
      ),
      // 4 stat cards
      div({className:'arc-stats-grid'},
        // Saboteur — RED (data key: copper)
        div({className:'arc-stat-card'},
          div({className:'arc-stat-head'},
            div({className:'arc-stat-dot', style:{background:'#C44747', color:'#C44747'}}),
            div({className:'arc-stat-label'}, 'saboteur')
          ),
          div({className:'arc-stat-value'},
            div({className:'arc-stat-num'}, thoughtCounts.copper),
            div({className:'arc-stat-unit'}, '/' + (totalThoughts || 0))
          ),
          div({className:'arc-stat-of'}, 'the resistance')
        ),
        // Acceptable — PINK
        div({className:'arc-stat-card'},
          div({className:'arc-stat-head'},
            div({className:'arc-stat-dot', style:{background:'#E8A5A5', color:'#E8A5A5'}}),
            div({className:'arc-stat-label'}, 'acceptable')
          ),
          div({className:'arc-stat-value'},
            div({className:'arc-stat-num'}, thoughtCounts.pink),
            div({className:'arc-stat-unit'}, '/' + (totalThoughts || 0))
          ),
          div({className:'arc-stat-of'}, 'neutral, no weight')
        ),
        // Good — GREEN
        div({className:'arc-stat-card'},
          div({className:'arc-stat-head'},
            div({className:'arc-stat-dot', style:{background:'#9BBA9D', color:'#9BBA9D'}}),
            div({className:'arc-stat-label'}, 'good')
          ),
          div({className:'arc-stat-value'},
            div({className:'arc-stat-num'}, thoughtCounts.green),
            div({className:'arc-stat-unit'}, '/' + (totalThoughts || 0))
          ),
          div({className:'arc-stat-of'}, 'adds to you')
        ),
        // The version — GOLD
        div({className:'arc-stat-card'},
          div({className:'arc-stat-head'},
            div({className:'arc-stat-dot', style:{background:'#F5D080', color:'#F5D080'}}),
            div({className:'arc-stat-label'}, 'the version')
          ),
          div({className:'arc-stat-value'},
            div({className:'arc-stat-num'}, thoughtCounts.gold),
            div({className:'arc-stat-unit'}, '/' + (totalThoughts || 0))
          ),
          div({className:'arc-stat-of'}, "who you're becoming")
        )
      )
    ),

    // ═══ PROGRESS TAB ═══
    tab === 'progress' && fr(
      div({className:'arc-meta'},
        span(null, 'protocol total'),
        span(null, sealedCount + ' of 90 sealed')
      ),
      div({className:'arc-rings-stage'},
        e('svg', {
          className:'arc-rings-svg',
          width:280, height:280, viewBox:'0 0 280 280',
          style:{transform:'rotate(-90deg)'}
        },
          // Tracks
          e('circle', {cx:140, cy:140, r:120, fill:'none', stroke:'rgba(245,242,234,0.06)', strokeWidth:3}),
          e('circle', {cx:140, cy:140, r:100, fill:'none', stroke:'rgba(245,242,234,0.06)', strokeWidth:3}),
          e('circle', {cx:140, cy:140, r:80,  fill:'none', stroke:'rgba(245,242,234,0.06)', strokeWidth:3}),
          e('circle', {cx:140, cy:140, r:60,  fill:'none', stroke:'rgba(245,242,234,0.06)', strokeWidth:3}),
          // Cream — days
          e('circle', {cx:140, cy:140, r:120, fill:'none',
            stroke:'#F5E5D0', strokeWidth:3, strokeLinecap:'round',
            strokeDasharray:fullLens[0],
            strokeDashoffset:ringOffsets[0],
            filter:'drop-shadow(0 0 6px rgba(245,229,208,0.6))',
            style:{transition:'stroke-dashoffset 1.6s var(--out-expo) 0.4s'}
          }),
          // Pink — consistency
          e('circle', {cx:140, cy:140, r:100, fill:'none',
            stroke:'#E8A5A5', strokeWidth:3, strokeLinecap:'round',
            strokeDasharray:fullLens[1],
            strokeDashoffset:ringOffsets[1],
            filter:'drop-shadow(0 0 6px rgba(232,165,165,0.5))',
            style:{transition:'stroke-dashoffset 1.6s var(--out-expo) 0.6s'}
          }),
          // Copper visual — action
          e('circle', {cx:140, cy:140, r:80, fill:'none',
            stroke:'#D9714C', strokeWidth:3, strokeLinecap:'round',
            strokeDasharray:fullLens[2],
            strokeDashoffset:ringOffsets[2],
            filter:'drop-shadow(0 0 6px rgba(217,113,76,0.5))',
            style:{transition:'stroke-dashoffset 1.6s var(--out-expo) 0.8s'}
          }),
          // Gold — clean
          e('circle', {cx:140, cy:140, r:60, fill:'none',
            stroke:'#F5D080', strokeWidth:3, strokeLinecap:'round',
            strokeDasharray:fullLens[3],
            strokeDashoffset:ringOffsets[3],
            filter:'drop-shadow(0 0 6px rgba(245,208,128,0.55))',
            style:{transition:'stroke-dashoffset 1.6s var(--out-expo) 1.0s'}

      div({className:'arc-stats-grid'},

        div({className:'arc-stat-card'},

            div({className:'arc-stat-dot', style:{background:'#E8A5A5', color:'#E8A5A5'}}),

/* ════════════════════════════════════════════════
   WISDOM — biblioteca de capitulos · deep ink room
   Chapters tab: 12 chapters as conquered/active/sealed objects
   Field manual tab: 8 principles paired with their practice
   ════════════════════════════════════════════════ */
const Wisdom = ({onBack, currentDay, onOpenLesson}) => {
  const [tab, setTab] = useState('chapters');
  const [expanded, setExpanded] = useState(() => {
    const activeChapter = chapterFor(currentDay);
    return new Set([activeChapter.n]);
  });
  const [evExpanded, setEvExpanded] = useState(() => {
    // Auto-expand the most recently unlocked evidence card
    const unlockedNow = EVIDENCE.filter(ev => {
      const ch = CHAPTERS.find(c => c.n === ev.chapter);
      return ch && currentDay > ch.range[1];
    });
    return new Set(unlockedNow.length ? [unlockedNow[unlockedNow.length-1].n] : []);
  });
  // Principles state — selected law (null = navigator) + valve open/closed
  const [selectedLaw, setSelectedLaw] = useState(null);
  const [valveOpen, setValveOpen] = useState(false);

  const toggleChapter = n => {
    const next = new Set(expanded);
    if(next.has(n)) next.delete(n); else next.add(n);
    setExpanded(next);
  };
  const toggleEv = n => {
    const next = new Set(evExpanded);
    if(next.has(n)) next.delete(n); else next.add(n);
    setEvExpanded(next);
  };

  // Group chapters by movement
  const byMovement = { I:[], II:[], III:[] };
  CHAPTERS.forEach(c => byMovement[c.movement].push(c));

  // Count unlocked evidence cards
  const unlockedEvidence = EVIDENCE.filter(ev => {
    const ch = CHAPTERS.find(c => c.n === ev.chapter);
    return ch && currentDay > ch.range[1];
  }).length;

  return div({className:'wisdom-room'},
    div({className:'wisdom-screen fade-up'},

      div({className:'sub-hdr'},
        div({className:'sub-hdr-text'},
          div({className:'sub-hdr-eyebrow'}, 'intelligence'),

// Render an evidence card based on whether its chapter has been completed
function renderEvidenceCard(ev, currentDay, expanded, toggle){
  const chapter = CHAPTERS.find(c => c.n === ev.chapter);
  const isUnlocked = chapter && currentDay > chapter.range[1];
  const isExpanded = expanded.has(ev.n);

  if(!isUnlocked){
    return div({key:ev.n, className:'ev-sealed'},
      div({className:'ev-sealed-num'}, pad(ev.n)),
      div({className:'ev-sealed-text'},
        div({className:'ev-sealed-title'}, ev.eyebrow),
        div({className:'ev-sealed-status'},
          `unlocks at close of chapter ${romanize(ev.chapter)}`
        )
      ),
      div({className:'ev-sealed-icon'},
        e('svg', {width:14, height:14, viewBox:'0 0 24 24', fill:'none'},
          e('rect', {x:5, y:11, width:14, height:9, rx:2, stroke:'#7A7670', strokeWidth:1.5}),
          e('path', {d:'M8 11V8a4 4 0 0 1 8 0v3', stroke:'#7A7670', strokeWidth:1.5})
        )
      )
    );
  }

  // Unlocked — collapsed or expanded
  return div({
    key:ev.n,
    className:`ev-card ${isExpanded?'expanded':'collapsed'}`,
    onClick:()=>toggle(ev.n),
  },
    div({className:'ev-card-meta'}, `${pad(ev.n)} · ${ev.eyebrow}`),
    h3({className:'ev-card-title'}, ev.title),
    div({className:'ev-card-source'}, ev.source),
    isExpanded && div({className:'ev-body'},
      ...ev.body.map((blk, i) => {
        if(blk.kind === 'lead') return p({key:i, className:'lead'}, blk.text);
        if(blk.kind === 'land') return p({key:i, className:'land'}, blk.text);
        return p({key:i}, blk.text);
      })
    )
  );
}

// Render a chapter card based on its state relative to currentDay
function renderChapterCard(chapter, currentDay, expanded, toggleChapter, onOpenLesson){
  const lessonsCount = chapter.range[1] - chapter.range[0] + 1;
  const isCompleted  = currentDay > chapter.range[1];
  const isActive     = currentDay >= chapter.range[0] && currentDay <= chapter.range[1];
  const isSealed     = currentDay < chapter.range[0];
  const isExpanded   = expanded.has(chapter.n);

  // ── SEALED ────────────────────────────────
  if(isSealed){
    return div({key:chapter.n, className:'chapter-card sealed'},
      div({className:'chapter-sealed-num'}, romanize(chapter.n)),
      div({className:'chapter-sealed-text'},
        div({className:'chapter-sealed-title'}, chapter.title),
        div({className:'chapter-sealed-status'},
          `opens day ${pad(chapter.range[0])} · ${lessonsCount} ${lessonsCount===1?'lesson':'lessons'}`
        )
      ),
      div({className:'chapter-sealed-icon'},
        e('svg', {width:14, height:14, viewBox:'0 0 24 24', fill:'none'},
          e('rect', {x:5, y:11, width:14, height:9, rx:2, stroke:'#7A7670', strokeWidth:1.5}),
          e('path', {d:'M8 11V8a4 4 0 0 1 8 0v3', stroke:'#7A7670', strokeWidth:1.5})
        )
      )
    );
  }

  // ── ACTIVE — current chapter ─────────────
  if(isActive){
    return div({key:chapter.n, className:'chapter-card active'},
      div({className:'chapter-meta-row'},
        div({className:'chapter-meta-eyebrow'},
          `chapter ${romanize(chapter.n)} · ${lessonsCount} lessons · ~3 min each`
        ),
        div({className:'chapter-meta-status live'}, 'in progress')
      ),
      h3({className:'chapter-name'}, ...renderChapterTitle(chapter)),
      e('ul', {className:'lesson-list'},
        ...Array.from({length:lessonsCount}, (_,i) => {
          const day = chapter.range[0] + i;
          const title = LESSON_TITLES[day] || `day ${pad(day)}`;
          const isToday  = day === currentDay;
          const isPast   = day < currentDay;
          const isFuture = day > currentDay;

          return e('li', {key:day},
            btn({
              className:`lesson-item ${isToday?'today':''} ${isFuture?'future':''}`,
              onClick: (isToday || isPast) ? () => onOpenLesson && onOpenLesson(day) : undefined,
              disabled: isFuture,
            },
              span({className:'lesson-item-num'}, pad(day)),
              span({className:'lesson-item-title'},
                isToday ? e('em', null, title) : title
              ),
              isToday && span({className:'lesson-item-tag'}, 'today'),
              isFuture && span({className:'lesson-item-dot'})
            )
          );
        })
      )
    );
  }

  // ── COMPLETED ─────────────────────────────
  return div({
    key:chapter.n,
    className:`chapter-card completed ${isExpanded?'expanded':''}`,
    onClick:(e)=> {
      // only toggle when clicking outside lesson items
      if(e.target.closest('.lesson-item')) return;
      toggleChapter(chapter.n);
    },
  },
    div({className:'chapter-meta-row'},
      div({className:'chapter-meta-eyebrow'},
        `chapter ${romanize(chapter.n)} · ${lessonsCount} ${lessonsCount===1?'lesson':'lessons'}`
      ),
      div({className:'chapter-meta-status'}, isExpanded ? 'collapse' : 'complete')
    ),
    h3({className:'chapter-name'}, ...renderChapterTitle(chapter)),
    isExpanded && e('ul', {className:'lesson-list'},
      ...Array.from({length:lessonsCount}, (_,i) => {
        const day = chapter.range[0] + i;
        const title = LESSON_TITLES[day] || `day ${pad(day)}`;
        return e('li', {key:day},
          btn({
            className:'lesson-item',
            onClick: (ev) => {
              ev.stopPropagation();
              onOpenLesson && onOpenLesson(day);
            },
          },
            span({className:'lesson-item-num'}, pad(day)),
            span({className:'lesson-item-title'}, title)
          )
        );
      })
    )
  );
}

/* ════════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════════ */
const App = () => {
  const [view, setView] = useState('home');
  const [exhaling, setExhaling] = useState(false);
  const [viewingLessonDay, setViewingLessonDay] = useState(null);
  const [data, setData] = useState(() => {
    const saved = ld();
    return saved || {
      onboarded:false, startDate:null,
      minutes:20, goal:'', actions:[],
      streak:0, checkIns:[], journal:[],
      name:''
    };
  });

  const persist = d => { setData(d); db(d); };

  const currentDay = useMemo(() => {
    if(!data.startDate) return 0;
    return Math.min(90, Math.max(1, daysBetween(data.startDate, todayISO()) + 1));
  }, [data.startDate]);

  // Auto-seal past days on day rollover
  useEffect(() => {
    if(!data.checkIns || !data.checkIns.length) return;
    const today = todayISO();
    let needsUpdate = false;
    const sealed = data.checkIns.map(ci => {
      if(ci.date !== today && !ci.sealed){
        needsUpdate = true;
        return {...ci, sealed:true};
      }
      return ci;
    });
    if(needsUpdate) persist({...data, checkIns:sealed});
  }, [currentDay]);

  // First-open chime — once per session, on first user gesture
  useEffect(() => {
    if(!data.onboarded) return;
    let played = false;
    const trigger = () => {
      if(played) return; played = true;
      playChime();
      window.removeEventListener('click', trigger);
      window.removeEventListener('touchstart', trigger);
    };
    window.addEventListener('click', trigger, {once:true});
    window.addEventListener('touchstart', trigger, {once:true});
    return () => {
      window.removeEventListener('click', trigger);
      window.removeEventListener('touchstart', trigger);
    };
  }, [data.onboarded]);

  const insight = useMemo(
    () => INSIGHTS.find(i => i.day === currentDay) || INSIGHTS[0],
    [currentDay]
  );

  const todayCi = (data.checkIns||[]).find(c => c.date === todayISO());
  const morningDone = !!(todayCi && todayCi.morning);
  const eveningDone = !!(todayCi && todayCi.evening);

  // ═══════════════════════════════════════════════════════════════════
  // PRACTICE STATE — dynamic-daily model
  //
  // Each day shows up to 3 practice slots. The rule:
  //   - Unsealed practices from the most recent prior day CARRY OVER
  //     (marked with the "unsealed · from yesterday" badge, text locked)
  //   - Remaining slots are EMPTY and editable — name today's intention
  //   - Sealed practices DO NOT reappear; they live in today's "sealed
  //     today" record (and the historical checkIns)
  //
  // Source of truth for a given day: that day's checkIn entry.
  // If today's checkIn doesn't exist yet, we synthesize the practice
  // state on the fly (without persisting) — it materializes the first
  // time the user marks something done or names a new practice.
  // ═══════════════════════════════════════════════════════════════════
  const practiceState = useMemo(() => {
    // Case A — today's checkIn exists. Use it (with backward-compat
    // fallback for old data missing actionsCarried).
    if(todayCi && todayCi.actionsSnapshot){
      const snap = todayCi.actionsSnapshot.slice(0, 3);
      while(snap.length < 3) snap.push('');
      const states = (todayCi.actionStates || snap.map(() => false)).slice(0, 3);
      while(states.length < 3) states.push(false);
      const sealedAt = (todayCi.actionSealedAt || snap.map(() => null)).slice(0, 3);
      while(sealedAt.length < 3) sealedAt.push(null);
      let carried = todayCi.actionsCarried;
      if(!carried){
        // Back-compat: infer from yesterday's actionStates if shape matches
        const prior = (data.checkIns||[])
          .filter(c => c.date < todayISO())
          .sort((a,b) => b.date.localeCompare(a.date));
        if(prior.length && prior[0].actionStates && prior[0].actionStates.length === snap.length){
          carried = prior[0].actionStates.map(s => !s);
        } else {
          carried = snap.map(() => false);
        }
      }
      carried = carried.slice(0, 3);
      while(carried.length < 3) carried.push(false);
      return { snap, states, sealedAt, carried };
    }

    // Case B — no today checkIn. Synthesize from prior day's unsealed
    // (carried) + empty slots, OR seed from data.actions on Day 1.
    const prior = (data.checkIns||[])
      .filter(c => c.date < todayISO())
      .sort((a,b) => b.date.localeCompare(a.date));

    if(!prior.length){
      // Day 1 — seed from onboarding values
      const seed = (data.actions || []).slice(0, 3);
      while(seed.length < 3) seed.push('');
      return {
        snap: seed,
        states: seed.map(() => false),
        sealedAt: seed.map(() => null),
        carried: seed.map(() => false)
      };
    }

    // Carry unsealed from most recent prior day
    const last = prior[0];
    const ySnap = last.actionsSnapshot || [];
    const yStates = last.actionStates || [];
    const snap = [];
    const carried = [];
    ySnap.forEach((text, i) => {
      if(text && text.trim() && !yStates[i]){
        snap.push(text);
        carried.push(true);
      }
    });
    // Fill remaining slots with empty/new
    while(snap.length < 3){
      snap.push('');
      carried.push(false);
    }
    const finalSnap = snap.slice(0, 3);
    return {
      snap: finalSnap,
      states: finalSnap.map(() => false),
      sealedAt: finalSnap.map(() => null),
      carried: carried.slice(0, 3)
    };
  }, [todayCi, data.actions, data.checkIns]);

  const todayActions   = practiceState.snap;
  const actionStates   = practiceState.states;
  const actionSealedAt = practiceState.sealedAt;
  const carriedStates  = practiceState.carried;

  const actionsCompleted = actionStates.filter(Boolean).length;
  const namedCount = todayActions.filter(t => t && t.trim()).length;

  // ─── Today's three rings ─────────────────────────
  // ring 1: practice — % actions completed today
  // ring 2: lesson — 100 if read, 0 if not
  // ring 3: rituals — 50 morning + 50 evening
  const todayPractice = useMemo(() => {
    const total = (data.actions||[]).length;
    if(!total) return 0;
    return (actionsCompleted / total) * 100;
  }, [actionsCompleted, data.actions]);

  const todayLesson = useMemo(() => {
    return (todayCi && todayCi.lessonRead) ? 100 : 0;
  }, [todayCi]);

  const todayRituals = useMemo(() => {
    let val = 0;
    if(todayCi && todayCi.morning) val += 50;
    if(todayCi && todayCi.evening) val += 50;
    return val;
  }, [todayCi]);

  // ─── Historical aggregates (used by Arc tab) ─────
  const con   = useMemo(() => {
    const ci = data.checkIns || [];
    if(!ci.length) return 0;
    return (ci.filter(c => c.morning && c.evening).length / ci.length) * 100;
  }, [data.checkIns]);

  const act   = useMemo(() => {
    const ci = data.checkIns || [];
    if(!ci.length) return 0;
    const t = (data.actions||[]).length || 1;
    return (ci.reduce((a,c) => a + ((c.actionsCompleted||0) / t), 0) / ci.length) * 100;
  }, [data.checkIns, data.actions]);

  const clean = useMemo(() => {
    const we = (data.checkIns||[]).filter(c => c.evening);
    if(!we.length) return 0;
    // Back-compat: old shape had sabotage:false as "clean". New shape has gratitude (any seal counts as clean — honest reporting).
    const cleanCount = we.filter(c => {
      const ev = c.evening;
      // New shape: any sealed evening with gratitude (or default seal) counts as clean
      if(ev.gratitude !== undefined || ev.at) return true;
      // Old shape fallback
      return ev.sabotage === false;
    }).length;
    return (cleanCount / we.length) * 100;
  }, [data.checkIns]);

  const identityScore = useMemo(
    () => Math.round(Math.min(100, (act*0.4) + (clean*0.3) + (con*0.3))),
    [con, act, clean]
  );

  // Runtime streak — recomputed every render from checkIns + today.
  // The persisted data.streak is kept for back-compat but not used for display.
  const liveStreak = useMemo(() => {
    const sealed = (data.checkIns||[]).filter(c => c.morning);
    if(!sealed.length) return 0;
    const sorted = [...sealed].sort((a,b) => new Date(b.date) - new Date(a.date));
    let streak = 0;
    let cursor = new Date(todayISO());
    for(const c of sorted){
      const d = Math.round((cursor - new Date(c.date)) / 86400000);
      if(d <= 1){
        streak++;
        cursor = new Date(c.date);
        cursor.setDate(cursor.getDate() - 1);
      } else break;
    }
    return streak;
  }, [data.checkIns]);

  // ═══════════════════════════════════════════════════════════════════
  // updatePractice — single atomic update for a practice slot.
  // opts = { text?: string, toggleDone?: bool }
  // Both can be applied in one persist call (avoids stale-data races
  // when user types-then-seals in quick succession).
  // ═══════════════════════════════════════════════════════════════════
  const updatePractice = (i, opts) => {
    const date = todayISO();
    const ci = [...(data.checkIns||[])];
    let idx = ci.findIndex(c => c.date === date);
    if(idx < 0){
      // Materialize today's checkIn from the synthesized practiceState
      // (carries unsealed from prior day; empty slots for new).
      ci.push({
        date, day: currentDay,
        morning: null, evening: null,
        actionsSnapshot: [...practiceState.snap],
        actionsCarried:  [...practiceState.carried],
        actionStates:    [...practiceState.states],
        actionSealedAt:  [...practiceState.sealedAt],
        actionsCompleted: 0,
      });
      idx = ci.length - 1;
    }
    if(ci[idx].sealed) return;

    // Pull current arrays (with safe fallbacks)
    const snap = [...(ci[idx].actionsSnapshot || ['', '', ''])];
    const st = [...(ci[idx].actionStates || snap.map(() => false))];
    const at = [...(ci[idx].actionSealedAt || snap.map(() => null))];
    const carried = [...(ci[idx].actionsCarried || snap.map(() => false))];
    // Pad
    while(snap.length < 3) snap.push('');
    while(st.length < 3) st.push(false);
    while(at.length < 3) at.push(null);
    while(carried.length < 3) carried.push(false);

    // Apply text update
    if(opts && typeof opts.text === 'string'){
      // Don't allow editing carried-text — protect yesterday's intent
      if(!carried[i]) snap[i] = opts.text;
    }
    // Apply toggle
    if(opts && opts.toggleDone){
      st[i] = !st[i];
      at[i] = st[i] ? new Date().toISOString() : null;
    }

    ci[idx] = {
      ...ci[idx],
      actionsSnapshot: snap,
      actionsCarried: carried,
      actionStates: st,
      actionSealedAt: at,
      actionsCompleted: st.filter(Boolean).length,
    };
    persist({...data, checkIns: ci});
  };

  // Compatibility aliases for downstream components
  const toggleAction = i => updatePractice(i, {toggleDone: true});
  const nameAction = (i, text) => updatePractice(i, {text});

  // Mark today's lesson as read — fires when user opens the deep ink room
  const markLessonRead = () => {
    if(todayCi && todayCi.lessonRead) return; // already read
    const date = todayISO();
    const ci = [...(data.checkIns||[])];
    let idx = ci.findIndex(c => c.date === date);
    if(idx < 0){
      ci.push({
        date, day: currentDay,
        morning: null, evening: null,
        actionsSnapshot: [...practiceState.snap],
        actionsCarried:  [...practiceState.carried],
        actionStates:    [...practiceState.states],
        actionSealedAt:  [...practiceState.sealedAt],
        actionsCompleted: 0,
        lessonRead: true,
      });
    } else {
      ci[idx] = {...ci[idx], lessonRead: true};
    }
    persist({...data, checkIns: ci});
  };

  const saveMorning = m => {
    const date = todayISO();
    const ci = [...(data.checkIns||[])];
    let idx = ci.findIndex(c => c.date === date);
    // Recalibration is allowed — overwrite the morning if it already exists today.
    if(idx < 0){
      ci.push({
        date, day: currentDay,
        morning: m, evening: null,
        actionsSnapshot: [...practiceState.snap],
        actionsCarried:  [...practiceState.carried],
        actionStates:    [...practiceState.states],
        actionSealedAt:  [...practiceState.sealedAt],
        actionsCompleted: 0,
      });
    } else {
      ci[idx] = {...ci[idx], morning: m};
    }
    // recompute streak based on consecutive days with morning sealed
    const sorted = ci.filter(c => c.morning).sort((a,b) => new Date(b.date) - new Date(a.date));
    let streak = 0;
    let cursor = new Date(todayISO());
    for(const c of sorted){
      const d = Math.round((cursor - new Date(c.date)) / 86400000);
      if(d <= 1){ streak++; cursor = new Date(c.date); cursor.setDate(cursor.getDate() - 1); }
      else break;
    }
    persist({...data, checkIns: ci, streak});
    setView('home');
  };

  const saveEvening = ev => {
    const date = todayISO();
    const ci = [...(data.checkIns||[])];
    let idx = ci.findIndex(c => c.date === date);
    if(idx < 0){
      ci.push({
        date, day: currentDay,
        morning: null, evening: ev,
        actionsSnapshot: [...practiceState.snap],
        actionsCarried:  [...practiceState.carried],
        actionStates:    [...practiceState.states],
        actionSealedAt:  [...practiceState.sealedAt],
        actionsCompleted: 0,
      });
    } else {
      ci[idx] = {...ci[idx], evening: ev};
    }
    persist({...data, checkIns: ci});
    setView('home');
  };

  const fireExhale = () => {
    setExhaling(true);
    playBell();
    haptic([30, 80, 50]);
    setTimeout(() => setExhaling(false), 4500);
  };

  const importBackup = file => {
    const r = new FileReader();
    r.onload = ev => {
      try{
        const pp = JSON.parse(ev.target.result);
        const restored = pp.data || pp;
        if(restored && restored.onboarded !== undefined){
          persist(restored);
          alert('Backup restored.');
        } else {
          alert('Invalid file.');
        }
      }catch{ alert('Invalid file.'); }
    };
    r.readAsText(file);
  };

  const mainViews = ['home','progress','wisdom','journal'];
  const showNav = mainViews.includes(view) && data.onboarded;

  // Onboarding gate
  if(!data.onboarded) return div({style:{minHeight:'100vh', position:'relative'}},
    e(Onboarding, {
      onComplete: d => persist({
        ...data, ...d,
        onboarded: true,
        startDate: todayISO(),
        streak: 0,
        checkIns: [],
        journal: []
      })
    })
  );

  return div({style:{minHeight:'100vh', position:'relative'}},
    // Exhale overlay (always mounted, fires when triggered)
    div({className:`exhale-overlay ${exhaling?'firing':''}`}),

    view === 'home'    && e(Dashboard, {
      data, onNav:setView,
      todayActions, actionStates, actionSealedAt, carriedStates,
      onToggle:toggleAction, onNameAction:nameAction,
      onMorning: () => setView('morning'),
      onEvening: () => setView('evening'),
      onLesson:  () => { markLessonRead(); setView('lesson'); },
      insight, morningDone, eveningDone, lessonRead: !!(todayCi && todayCi.lessonRead),
      currentDay, con, act, clean, liveStreak,
      todayPractice, todayLesson, todayRituals
    }),
    view === 'lesson'  && e(LessonDetail, {
      insight: viewingLessonDay
        ? (INSIGHTS.find(i => i.day === viewingLessonDay) || INSIGHTS[0])
        : insight,
      currentDay: viewingLessonDay || currentDay,
      onBack: () => { setViewingLessonDay(null); setView('home'); }
    }),
    view === 'morning' && e(Morning,  {data, onComplete:saveMorning, onBack: () => setView('home')}),
    view === 'evening' && e(Evening,  {
      onComplete: saveEvening,
      onBack: () => setView('home'),
      actionsCompleted, totalActions: (data.actions||[]).length,
      onExhale: fireExhale,
      currentDay,
    }),
    view === 'journal' && e(Log,  {data, currentDay, onSave: j => persist({...data, journal:[...(data.journal||[]), j]}), onBack: () => setView('home')}),
    view === 'progress'&& e(Progress, {data, onBack: () => setView('home'), currentDay, identityScore, con, act, clean}),
    view === 'wisdom'  && e(Wisdom,   {
      onBack: () => setView('home'),
      currentDay,
      onOpenLesson: (day) => {
        setViewingLessonDay(day || null);
        setView('lesson');
      }
    }),
    view === 'settings'&& e(Settings, {
      data,
      onSave: d => { persist({...data, ...d}); setView('home'); },
      onBack: () => setView('home'),
      onReset: () => {
        persist({
          onboarded:false, startDate:null,
          minutes:20, goal:'', actions:[],
          streak:0, checkIns:[], journal:[],
          name: data.name || ''
        });
        setView('home');
      },
      onImport: importBackup,
    }),

    showNav && e(BottomNav, {view, onNav: v => setView(v)})
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
</script>
</body>
</html>
